<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金名魔法學院 - 字形幻化術 (高手進階)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #020617;
            color: #f8fafc;
        }
        .magic-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: linear-gradient(145deg, rgba(30, 27, 75, 0.4), rgba(15, 23, 42, 0.6));
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .magic-card:hover {
            transform: scale(1.02);
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
        }
        .golden-text {
            background: linear-gradient(to right, #d4af37, #fef3c7, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            const [svg, setSvg] = React.useState('');
            React.useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    const iconSvg = window.lucide.icons[name].toSvg({
                        class: className,
                        ...props
                    });
                    setSvg(iconSvg);
                }
            }, [name, className]);
            return <span dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('library');
            const [quizIndex, setQuizIndex] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [userAnswers, setUserAnswers] = useState({});
            const [studentName, setStudentName] = useState('');
            const [score, setScore] = useState(0);

            // 教學數據內容 (基於圖二、圖三，並加入注音)
            const libraryData = [
                {
                    title: "燥、噪、躁 辨析",
                    desc: "常用於夏日炎熱、聲音干擾與心情狀態。",
                    items: [
                        { char: "燥", zhuyin: "ㄗㄠˋ", usage: "燥熱", detail: "火部，指乾枯、火氣大。" },
                        { char: "噪", zhuyin: "ㄗㄠˋ", usage: "噪音", detail: "口部，指聲音喧鬧、吵雜。" },
                        { char: "躁", zhuyin: "ㄗㄠˋ", usage: "煩躁", detail: "足部，指焦急、不冷靜，如「毛躁」。" }
                    ]
                },
                {
                    title: "辨、辯、辦、瓣、絆 辨析",
                    desc: "中間部件決定意義的核心。",
                    items: [
                        { char: "辨", zhuyin: "ㄅㄧㄢˋ", usage: "辨明", detail: "「刂」部，指區別、判斷。" },
                        { char: "辯", zhuyin: "ㄅㄧㄢˋ", usage: "辯論", detail: "「言」部，指言語爭論、解釋。" },
                        { char: "辦", zhuyin: "ㄅㄢˋ", usage: "辦公", detail: "「力」部，指處理、具備。" },
                        { char: "瓣", zhuyin: "ㄅㄢˋ", usage: "花瓣", detail: "「瓜」部，指植物的花片或瓜瓤。" },
                        { char: "絆", zhuyin: "ㄅㄢˋ", usage: "絆腳石", detail: "「糸」部，指束縛、牽累。" }
                    ]
                },
                {
                    title: "會考常考題解析",
                    desc: "常見錯誤類型：形近、音近而誤。",
                    items: [
                        { char: "脛", zhuyin: "ㄐㄧㄥˋ", usage: "不脛而走", detail: "「脛」為小腿，比喻傳播迅速。常誤作「逕」。" },
                        { char: "凡", zhuyin: "ㄈㄢˊ", usage: "不同凡響", detail: "「凡」指平凡、普通。常誤作「反」。" },
                        { char: "簣", zhuyin: "ㄎㄨㄟˋ", usage: "功虧一簣", detail: "「簣」為盛土的筐子。比喻差最後一點。" }
                    ]
                }
            ];

            // 測驗題庫 (全數來自圖二、圖三內容)
            const quizData = [
                { 
                    type: "choice", 
                    q: "哈利波特寫了一封信給妙麗：「夏日的午後，天氣□熱，加上外面震耳欲聾的□音，真讓人覺得心情煩□不已。」空格內正確字形依序為：", 
                    options: ["躁，燥，噪", "噪，躁，燥", "燥，噪，躁", "燥，噪，躁"], 
                    correct: 2, 
                    hint: "燥(ㄗㄠˋ)熱用於天氣；噪(ㄗㄠˋ)音用於聲音；煩躁(ㄗㄠˋ)用於心情。" 
                },
                { 
                    type: "choice", 
                    q: "下列成語中的字，何者與「□年累月」中的字『不同』？ (甲)天□地義 (乙)□世駭俗 (丙)□濟拮據 (丁)滿腹□綸", 
                    options: ["(甲)", "(乙)", "(丙)", "(丁)"], 
                    correct: 1, 
                    hint: "「經(ㄐㄧㄥ)年累月」中填入的是「經」。(乙)應填入「驚(ㄐㄧㄥ)」世駭俗。" 
                },
                { 
                    type: "choice", 
                    q: "慧慈綁了「辮」子，經過滿是花(  )的加園，走進(  )公室。括號內依序填入？", 
                    options: ["瓣，辦", "辨，辦", "辦，瓣", "辯，辦"], 
                    correct: 0, 
                    hint: "花片為「瓣(ㄅㄢˋ)」；處理事務的地方為「辦(ㄅㄢˋ)」公室。" 
                },
                { 
                    type: "choice", 
                    q: "與老師討論有關(  )論比賽的事情，要能(  )明事理，才能克敵制勝。括號內依序填入？", 
                    options: ["辨，辯", "辯，辨", "辦，辨", "辯，瓣"], 
                    correct: 1, 
                    hint: "言詞爭論為「辯(ㄅㄧㄢˋ)」；區分判斷為「辨(ㄅㄧㄢˋ)」明。" 
                },
                { 
                    type: "choice", 
                    q: "【107會考】下列文句，何者用字完全正確？", 
                    options: ["他倆研究方法不同，卻殊徒同歸", "經過老師開導，他茅塞頓開，心情豁然開朗", "因為嬌矜自滿的態度，成績無法進步", "他的穿著總是一層不變，都是西裝"], 
                    correct: 1, 
                    hint: "1.殊途(ㄊㄨˊ)同歸；3.驕(ㄐㄧㄠ)矜自滿；4.一成(ㄔㄥˊ)不變。" 
                },
                { 
                    type: "choice", 
                    q: "【105會考】「申」與「由」字形相近。下列文句中的錯別字，何者也屬於「形近而誤」？", 
                    options: ["香遠易清，亭亭淨植", "萬里赴戒機，關山度若飛", "忽有龐然大物，拔山搗樹而來", "孔明乃披鶴氅，戴綸巾"], 
                    correct: 1, 
                    hint: "「戒」機應為「戎(ㄖㄨㄥˊ)」機。戎與戒字形相似。搗(ㄉㄠˇ)為音近而誤(倒 ㄉㄠˇ)。" 
                },
                { 
                    type: "choice", 
                    q: "【106會考】下列文句，何者用字完全正確？", 
                    options: ["這款產品效果極佳，才剛上市便不逕而走", "實驗接近完成，卻因疏忽而功虧一簣", "練習後，他的演出果然不同反響", "乘客面對警鈴，一時間有些不知所措"], 
                    correct: 1, 
                    hint: "1.不脛(ㄐㄧㄥˋ)而走；3.不同凡(ㄈㄢˊ)響；4.不知所措(ㄘㄨㄛˋ)。" 
                },
                { 
                    type: "choice", 
                    q: "下列哪一個選項用字「錯誤」？", 
                    options: ["我們不應該妨害他人的自由", "颱風來臨前要做好防災工作", "週日全家人去拜訪親戚", "我們不應該購買彷冒品"], 
                    correct: 3, 
                    hint: "「彷(ㄈㄤˇ)」冒品應改為「仿(ㄈㄤˇ)」冒品。" 
                }
            ];

            const handleAnswer = (idx) => {
                setUserAnswers({ ...userAnswers, [quizIndex]: idx });
                if (quizIndex < quizData.length - 1) {
                    setTimeout(() => setQuizIndex(quizIndex + 1), 300);
                }
            };

            const finishQuiz = () => {
                let correctCount = 0;
                quizData.forEach((q, i) => {
                    if (userAnswers[i] === q.correct) correctCount++;
                });
                setScore(Math.round((correctCount / quizData.length) * 100));
                setShowResult(true);
            };

            const reset = () => {
                setQuizIndex(0);
                setUserAnswers({});
                setShowResult(false);
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="no-print pt-12 pb-24 px-4 text-center bg-[#020617] relative overflow-hidden">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full opacity-20 pointer-events-none">
                            <div className="absolute top-10 left-10 w-32 h-32 bg-blue-500 rounded-full blur-[100px]"></div>
                            <div className="absolute bottom-10 right-10 w-32 h-32 bg-amber-500 rounded-full blur-[100px]"></div>
                        </div>

                        <div className="relative z-10">
                            <div className="inline-flex items-center gap-3 px-6 py-2 bg-amber-500/10 rounded-full border border-amber-500/50 mb-6 animate-pulse">
                                <Icon name="shield" className="text-amber-500" />
                                <span className="text-amber-500 font-bold tracking-widest text-xs uppercase">Jinming Magic Academy Elite</span>
                            </div>
                            <h1 className="text-5xl md:text-7xl font-black mb-6 golden-text italic">
                                字形幻化術
                            </h1>
                            <p className="text-slate-400 font-medium text-lg max-w-2xl mx-auto">
                                高階魔法使試煉：洞穿字形的偽裝，精準掌握中文奧義
                            </p>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 -mt-16 pb-24 relative z-20">
                        {/* Tabs */}
                        <nav className="no-print flex justify-center gap-4 mb-12">
                            <button 
                                onClick={() => setActiveTab('library')}
                                className={`px-8 py-4 rounded-2xl font-black transition-all flex items-center gap-2 ${activeTab === 'library' ? 'bg-amber-500 text-slate-900 shadow-[0_0_20px_rgba(245,158,11,0.3)]' : 'bg-slate-900/80 text-slate-400 border border-slate-800'}`}
                            >
                                <Icon name="book" /> 奧義圖書館
                            </button>
                            <button 
                                onClick={() => setActiveTab('quiz')}
                                className={`px-8 py-4 rounded-2xl font-black transition-all flex items-center gap-2 ${activeTab === 'quiz' ? 'bg-amber-500 text-slate-900 shadow-[0_0_20px_rgba(245,158,11,0.3)]' : 'bg-slate-900/80 text-slate-400 border border-slate-800'}`}
                            >
                                <Icon name="swords" /> 高手試煉場
                            </button>
                        </nav>

                        {activeTab === 'library' ? (
                            <div className="grid gap-8">
                                {libraryData.map((group, idx) => (
                                    <div key={idx} className="magic-card p-8 rounded-[40px] backdrop-blur-md">
                                        <div className="flex items-center gap-4 mb-8">
                                            <div className="w-12 h-12 rounded-2xl bg-amber-500/20 flex items-center justify-center text-amber-500 border border-amber-500/30">
                                                <Icon name="sparkles" />
                                            </div>
                                            <div>
                                                <h2 className="text-2xl font-black text-white">{group.title}</h2>
                                                <p className="text-slate-500 text-sm">{group.desc}</p>
                                            </div>
                                        </div>
                                        <div className="grid md:grid-cols-3 gap-6">
                                            {group.items.map((item, i) => (
                                                <div key={i} className="bg-slate-950/50 p-6 rounded-3xl border border-slate-800/50 hover:bg-slate-900/50 transition-colors relative">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <div className="text-4xl font-black text-amber-500">{item.char}</div>
                                                        <div className="bg-amber-500/10 px-2 py-1 rounded text-xs font-bold text-amber-500 border border-amber-500/20">
                                                            {item.zhuyin}
                                                        </div>
                                                    </div>
                                                    <div className="text-lg font-bold text-white mb-2">{item.usage}</div>
                                                    <p className="text-slate-400 text-sm leading-relaxed">{item.detail}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="max-w-4xl mx-auto">
                                {!showResult ? (
                                    <div className="magic-card p-10 md:p-16 rounded-[48px] relative overflow-hidden">
                                        {/* Progress Bar */}
                                        <div className="absolute top-0 left-0 w-full h-2 bg-slate-800">
                                            <div 
                                                className="h-full bg-amber-500 shadow-[0_0_15px_#f59e0b] transition-all duration-500" 
                                                style={{ width: `${((quizIndex + 1) / quizData.length) * 100}%` }}
                                            ></div>
                                        </div>

                                        <div className="flex justify-between items-center mb-12">
                                            <span className="text-amber-500 font-black text-sm tracking-[0.2em] uppercase">Trial {quizIndex + 1} / {quizData.length}</span>
                                            <div className="flex gap-2">
                                                {quizData.map((_, i) => (
                                                    <div key={i} className={`w-2 h-2 rounded-full ${i === quizIndex ? 'bg-amber-500 scale-150' : userAnswers[i] !== undefined ? 'bg-emerald-500' : 'bg-slate-700'} transition-all`}></div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="mb-12">
                                            <h3 className="text-2xl md:text-4xl font-black text-white leading-snug">
                                                {quizData[quizIndex].q}
                                            </h3>
                                        </div>

                                        <div className="grid gap-4">
                                            {quizData[quizIndex].options.map((opt, idx) => (
                                                <button
                                                    key={idx}
                                                    onClick={() => handleAnswer(idx)}
                                                    className={`p-6 rounded-3xl text-left border-2 transition-all flex items-center justify-between group ${
                                                        userAnswers[quizIndex] === idx 
                                                        ? 'bg-amber-500/20 border-amber-500 text-amber-500' 
                                                        : 'bg-slate-900 border-slate-800 hover:border-slate-600 text-slate-300'
                                                    }`}
                                                >
                                                    <div className="flex items-center gap-6">
                                                        <span className="w-10 h-10 rounded-xl bg-slate-950 flex items-center justify-center font-black text-amber-500 border border-slate-800">
                                                            {String.fromCharCode(65 + idx)}
                                                        </span>
                                                        <span className="text-xl font-bold">{opt}</span>
                                                    </div>
                                                    {userAnswers[quizIndex] === idx && <Icon name="circle-check" />}
                                                </button>
                                            ))}
                                        </div>

                                        <div className="mt-16 pt-8 border-t border-slate-800 flex justify-between items-center">
                                            <button 
                                                onClick={() => setQuizIndex(Math.max(0, quizIndex - 1))}
                                                className="text-slate-500 hover:text-white font-bold flex items-center gap-2"
                                                disabled={quizIndex === 0}
                                            >
                                                <Icon name="arrow-left" /> 返回上一題
                                            </button>
                                            
                                            {Object.keys(userAnswers).length === quizData.length ? (
                                                <button 
                                                    onClick={finishQuiz}
                                                    className="bg-amber-500 text-slate-900 px-12 py-4 rounded-2xl font-black shadow-lg hover:scale-105 transition-all"
                                                >
                                                    封印幻術 (交卷)
                                                </button>
                                            ) : (
                                                <div className="text-slate-600 text-sm italic font-medium">
                                                    請完成所有試煉以解鎖成果
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-8 animate-in fade-in zoom-in duration-500">
                                        <div className="magic-card p-16 rounded-[56px] text-center relative overflow-hidden">
                                            <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(245,158,11,0.1),transparent)] pointer-events-none"></div>
                                            <div className="relative z-10">
                                                <div className="w-24 h-24 bg-amber-500/20 rounded-full flex items-center justify-center text-amber-500 mx-auto mb-6 border border-amber-500/30">
                                                    <Icon name="trophy" className="w-12 h-12" />
                                                </div>
                                                <h2 className="text-2xl font-black text-slate-400 mb-2 tracking-widest uppercase">法力鑑定結果</h2>
                                                <div className="text-9xl font-black golden-text mb-4">{score}</div>
                                                <p className="text-2xl font-bold text-white mb-10">
                                                    {score === 100 ? "大魔導師：字魂不滅，幻象莫及" : 
                                                     score >= 80 ? "高階法師：洞若觀火，唯細微處需磨練" : 
                                                     score >= 60 ? "見習法師：尚能自保，需勤加修煉" : 
                                                     "麻瓜學員：速回奧義圖書館補習"}
                                                </p>

                                                <div className="max-w-sm mx-auto mb-10">
                                                    <input 
                                                        type="text"
                                                        value={studentName}
                                                        onChange={(e) => setStudentName(e.target.value)}
                                                        placeholder="請輸入法師尊號..."
                                                        className="w-full bg-slate-950 border border-slate-800 rounded-2xl p-5 text-center text-white font-bold focus:border-amber-500 outline-none transition-all"
                                                    />
                                                </div>

                                                <div className="flex flex-wrap justify-center gap-4">
                                                    <button onClick={() => window.print()} className="bg-white text-slate-900 px-10 py-5 rounded-2xl font-black flex items-center gap-2 hover:bg-amber-500 transition-all">
                                                        <Icon name="file-text" /> 列印修行證明
                                                    </button>
                                                    <button onClick={reset} className="bg-slate-800 text-white px-10 py-5 rounded-2xl font-black flex items-center gap-2 hover:bg-slate-700 transition-all">
                                                        <Icon name="rotate-ccw" /> 再次挑戰
                                                    </button>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="magic-card p-12 rounded-[48px]">
                                            <h4 className="text-xl font-black text-amber-500 mb-8 flex items-center gap-3">
                                                <Icon name="search-code" /> 試煉細節檢閱
                                            </h4>
                                            <div className="space-y-6">
                                                {quizData.map((q, i) => {
                                                    const isCorrect = userAnswers[i] === q.correct;
                                                    return (
                                                        <div key={i} className={`p-8 rounded-3xl border ${isCorrect ? 'bg-emerald-500/5 border-emerald-500/20' : 'bg-rose-500/5 border-rose-500/20'}`}>
                                                            <div className="flex justify-between gap-4 mb-4">
                                                                <p className="text-white font-bold text-lg">{i+1}. {q.q}</p>
                                                                <Icon name={isCorrect ? "check-circle" : "x-circle"} className={isCorrect ? "text-emerald-500" : "text-rose-500"} />
                                                            </div>
                                                            <div className="flex flex-wrap gap-4 text-sm mb-4">
                                                                <span className={`px-4 py-2 rounded-xl font-bold ${isCorrect ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white'}`}>
                                                                    您的選擇：{q.options[userAnswers[i]] || "未作答"}
                                                                </span>
                                                                {!isCorrect && (
                                                                    <span className="px-4 py-2 rounded-xl bg-emerald-500/20 text-emerald-400 font-bold border border-emerald-500/30">
                                                                        正確解答：{q.options[q.correct]}
                                                                    </span>
                                                                )}
                                                            </div>
                                                            <div className="bg-slate-950/80 p-4 rounded-2xl text-slate-400 text-sm leading-relaxed border border-slate-800">
                                                                <strong className="text-amber-500 mr-2">魔法提示：</strong>{q.hint}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Print Only View */}
                    <div className="print-only p-12 text-black">
                        <div className="text-center border-b-4 border-black pb-8 mb-8">
                            <h1 className="text-4xl font-black mb-2">金名魔法學院 - 字形幻化術修行證</h1>
                            <p className="text-xl">精英高手試煉 成果報告單</p>
                        </div>
                        <div className="grid grid-cols-2 gap-8 mb-8 text-xl">
                            <p><strong>法師尊號：</strong> {studentName || "________________"}</p>
                            <p><strong>鑑定法力值：</strong> {score} / 100</p>
                        </div>
                        <div className="space-y-6">
                            {quizData.map((q, i) => (
                                <div key={i} className="border-b pb-4">
                                    <p className="font-bold mb-2">{i+1}. {q.q}</p>
                                    <p>您的回答：{q.options[userAnswers[i]]} {userAnswers[i] === q.correct ? " (✓)" : ` (✗，正確：${q.options[q.correct]})`}</p>
                                </div>
                            ))}
                        </div>
                        <div className="mt-12 text-center text-sm text-gray-500">
                            這份證明由金名魔法學院字形鑑定委員會認證
                        </div>
                    </div>

                    {/* Fixed Footer Status */}
                    <footer className="no-print fixed bottom-0 left-0 w-full bg-slate-950/80 backdrop-blur-md border-t border-slate-800 p-4 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 rounded-xl bg-amber-500 flex items-center justify-center text-slate-950">
                                    <Icon name="flame" />
                                </div>
                                <div>
                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Current Unit</p>
                                    <p className="text-white font-black text-sm">高手進階測驗 (會考暖身)</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-8">
                                <div className="hidden sm:block text-right">
                                    <p className="text-[10px] text-slate-500 font-bold uppercase">Progress</p>
                                    <p className="text-white font-black">{Object.keys(userAnswers).length} / {quizData.length}</p>
                                </div>
                                <button 
                                    onClick={() => { setActiveTab('quiz'); reset(); }}
                                    className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-2 rounded-xl font-bold text-sm transition-all"
                                >
                                    重啟試煉
                                </button>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
