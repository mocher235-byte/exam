<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金名魔法學院 - 字形幻化術 (二)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX Parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
        }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; color: black !important; }
        }
        .print-only { display: none; }
        .magic-glow {
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        .magic-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body class="bg-[#0f172a] text-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            const [svg, setSvg] = React.useState('');
            React.useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    const iconSvg = window.lucide.icons[name].toSvg({
                        class: className,
                        ...props
                    });
                    setSvg(iconSvg);
                }
            }, [name, className]);
            return <span dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('library');
            const [selectedGroup, setSelectedGroup] = useState('all');
            const [searchTerm, setSearchTerm] = useState('');
            const [quizIndex, setQuizIndex] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [score, setScore] = useState(0);
            const [userAnswers, setUserAnswers] = useState({});
            const [wrongAnswers, setWrongAnswers] = useState([]);
            const [studentName, setStudentName] = useState('');

            const groups = [
                { id: 'all', label: '全部咒語' },
                { id: 'huan', label: '「奐」系列' },
                { id: 'zao', label: '「喿/操」系列' },
                { id: 'le', label: '「樂」系列' },
                { id: 'paper', label: '卷/券/衷/衰' },
                { id: 'cuo', label: '搓/蹉/磋' }
            ];

            const magicData = [
                { char: '擻', pinyin: 'ㄙㄡˇ', meaning: '精神奮發、振作', example: '精神抖「擻」', groupId: 'other' },
                { char: '藪', pinyin: 'ㄙㄡˇ', meaning: '人或物聚集的地方', example: '犯罪淵「藪」', note: '淵藪：原指魚和獸類聚居的地方。後比喻壞人或壞事聚集的場所。', groupId: 'other' },
                { char: '卷', pinyin: 'ㄐㄩㄢˋ', meaning: '書籍的通稱 / 考試測驗題紙', example: '手不釋「卷」、考「卷」', groupId: 'paper' },
                { char: '券', pinyin: 'ㄑㄩㄢˋ', meaning: '可作憑證的紙票 / 具有價值可轉讓的票據', example: '入場「券」、優待「券」、消費「券」', groupId: 'paper' },
                { char: '奐', pinyin: 'ㄏㄨㄢˋ', meaning: '文采鮮明而美麗', example: '美輪美「奐」 (常用於形容房屋高大華麗)', groupId: 'huan' },
                { char: '喚', pinyin: 'ㄏㄨㄢˋ', meaning: '叫喊、呼喊', example: '千呼萬「喚」、呼「喚」', groupId: 'huan' },
                { char: '瘓', pinyin: 'ㄏㄨㄢˋ', meaning: '肢體麻木，不能自由活動', example: '身體癱「瘓」', groupId: 'huan' },
                { char: '換', pinyin: 'ㄏㄨㄢˋ', meaning: '改變、更改', example: '更「換」、調「換」', groupId: 'huan' },
                { char: '煥', pinyin: 'ㄏㄨㄢˋ', meaning: '明亮、有神的樣子', example: '容光「煥」發、「煥」然一新', groupId: 'huan' },
                { char: '渙', pinyin: 'ㄏㄨㄢˋ', meaning: '離散、不集中的樣子', example: '精神「渙」散', groupId: 'huan' },
                { char: '衷', pinyin: 'ㄓㄨㄥ', meaning: '內心', example: '「衷」心、由「衷」', groupId: 'paper' },
                { char: '哀', pinyin: 'ㄞ', meaning: '悲傷，心裡難過', example: '「哀」傷、悲「哀」', groupId: 'paper' },
                { char: '衰', pinyin: 'ㄕㄨㄞ', meaning: '由強盛而逐漸弱敗', example: '「衰」弱、「衰」敗', groupId: 'paper' },
                { char: '臾', pinyin: 'ㄩˊ', meaning: '一下子，指很短的時間', example: '須「臾」', groupId: 'other' },
                { char: '叟', pinyin: 'ㄙㄡˇ', meaning: '老人', example: '童「叟」無欺', groupId: 'other' },
                { char: '藻', pinyin: 'ㄗㄠˇ', meaning: '水草名', example: '水「藻」', groupId: 'zao' },
                { char: '澡', pinyin: 'ㄗㄠˇ', meaning: '沐浴', example: '洗「澡」', groupId: 'zao' },
                { char: '噪', pinyin: 'ㄗㄠˋ', meaning: '喧鬧、嘈雜', example: '鼓「噪」、「噪」音', groupId: 'zao' },
                { char: '躁', pinyin: 'ㄗㄠˋ', meaning: '指心情擾動而不平靜', example: '急「躁」、焦「躁」、心煩氣「躁」', groupId: 'zao' },
                { char: '燥', pinyin: 'ㄗㄠˋ', meaning: '枯乾、缺乏水分的', example: '乾「燥」、「燥」熱、枯「燥」乏味', groupId: 'zao' },
                { char: '燥', pinyin: 'ㄙㄠˋ', meaning: '剁成細碎的肉', example: '肉「燥」飯', groupId: 'zao' },
                { char: '操', pinyin: 'ㄘㄠ', meaning: '掌握、運作', example: '「操」作、「操」之在我', groupId: 'zao' },
                { char: '臊', pinyin: 'ㄙㄠ', meaning: '腥臭的氣味', example: '羊「臊」味', groupId: 'zao' },
                { char: '臊', pinyin: 'ㄙㄠˋ', meaning: '羞愧、害羞，難為情的樣子', example: '害「臊」', groupId: 'zao' },
                { char: '爍', pinyin: 'ㄕㄨㄛˋ', meaning: '明滅閃爍的樣子', example: '閃「爍」', groupId: 'le' },
                { char: '鑠', pinyin: 'ㄕㄨㄛˋ', meaning: '用火熔化金屬', example: '眾口「鑠」金 (指謠言足以混淆是非)', groupId: 'le' },
                { char: '礫', pinyin: 'ㄌㄧˋ', meaning: '小石子', example: '土「礫」、瓦「礫」', groupId: 'le' },
                { char: '搓', pinyin: 'ㄘㄨㄛ', meaning: '用雙手不斷的摩擦', example: '不斷「搓」揉著雙手', groupId: 'cuo' },
                { char: '蹉', pinyin: 'ㄘㄨㄛ', meaning: '虛度光陰，而不加以把握', example: '「蹉」跎', groupId: 'cuo' },
                { char: '磋', pinyin: 'ㄘㄨㄛ', meaning: '本指治煉玉石，引申為互相研究學問', example: '切「磋」琢磨', groupId: 'cuo' }
            ];

            const quizData = [
                { story: "進入大魔導師的演講會場時，門衛要求出示：", q: "進入會場需要出示什麼？", options: ["入場卷", "入場券", "入場圈", "入場捲"], correct: 1, hint: "提示：『券』(ㄑㄩㄢˋ) 指憑證、票據，下方為『力』。" },
                { story: "魔法師經過一整天的修煉，感覺精神很不集中：", q: "形容精神不集中、離散的樣子：", options: ["精神喚散", "精神煥散", "精神渙散", "精神換散"], correct: 2, hint: "提示：『渙』(ㄏㄨㄢˋ) 是水部，有消散之意。" },
                { story: "這座魔法塔蓋得非常壯麗美觀，大法師讚嘆：", q: "形容建築高大華麗的成語？", options: ["美輪美換", "美輪美喚", "美輪美渙", "美輪美奐"], correct: 3, hint: "提示：『奐』(ㄏㄨㄢˋ) 意指文采鮮明美麗。" },
                { story: "學徒不小心把魔法藥水弄乾了，周遭變得非常缺乏水分：", q: "形容氣候或環境枯乾：", options: ["乾躁", "乾燥", "乾噪", "乾燥"], correct: 1, hint: "提示：『燥』(ㄗㄠˋ) 是火部，與水分枯乾有關。" },
                { story: "這是一碗學院食堂最有名的碎肉蓋飯：", q: "『肉(  )飯』的正確寫法與讀音：", options: ["肉燥 (ㄗㄠˋ)", "肉臊 (ㄙㄠˋ)", "肉燥 (ㄙㄠˋ)", "肉噪 (ㄗㄠˋ)"], correct: 2, hint: "提示：根據教材，剁碎的肉唸作『ㄙㄠˋ』，字為『燥』。" },
                { story: "老法師對待學徒非常誠實，從不欺瞞：", q: "形容對待客人誠實信用：", options: ["童臾無欺", "童叟無欺", "童臾無欺", "童叟無欺"], correct: 3, hint: "提示：『叟』(ㄙㄡˇ) 指老人；『臾』指短暫時間。" },
                { story: "魔法森林的湖底長滿了綠色的：", q: "湖裡的綠色植物：", options: ["水澡", "水藻", "水躁", "水噪"], correct: 1, hint: "提示：『藻』(ㄗㄠˇ) 艸部，指水生植物。" },
                { story: "面對困難時，我們應該互相研究討論，共同進步：", q: "朋友間互相研究學問稱為？", options: ["切磋", "切搓", "切蹉", "切瑳"], correct: 0, hint: "提示：『磋』(ㄘㄨㄛ) 石部，本指琢磨玉石。" },
                { story: "光陰似箭，千萬不要隨便浪費時間：", q: "形容虛度光陰：", options: ["搓跎", "蹉跎", "磋跎", "蹉托"], correct: 1, hint: "提示：『蹉』(ㄘㄨㄛ) 足部，有失足、虛度之意。" },
                { story: "流言蜚語非常可怕，甚至能混淆是非：", q: "比喻眾口同聲，廢金也可以熔化的成語：", options: ["眾口爍金", "眾口鑠金", "眾口礫金", "眾口爍經"], correct: 1, hint: "提示：『鑠』(ㄕㄨㄛˋ) 金部，指熔化金屬。" }
            ];

            const filteredData = magicData.filter(d => {
                const matchesSearch = d.char.includes(searchTerm) || d.meaning.includes(searchTerm) || d.example.includes(searchTerm);
                const matchesGroup = selectedGroup === 'all' || d.groupId === selectedGroup;
                return matchesSearch && matchesGroup;
            });

            const handleSelectOption = (optionIdx) => {
                setUserAnswers(prev => ({ ...prev, [quizIndex]: optionIdx }));
                if (quizIndex < quizData.length - 1) {
                    setTimeout(() => setQuizIndex(quizIndex + 1), 600);
                }
            };

            const calculateResults = () => {
                let finalScore = 0;
                const finalWrongs = [];
                quizData.forEach((q, idx) => {
                    if (userAnswers[idx] === q.correct) {
                        finalScore += 10;
                    } else {
                        finalWrongs.push({
                            id: idx + 1,
                            question: q.q,
                            yourAnswer: userAnswers[idx] !== undefined ? q.options[userAnswers[idx]] : "未作答",
                            correctAnswer: q.options[q.correct],
                            hint: q.hint
                        });
                    }
                });
                setScore(finalScore);
                setWrongAnswers(finalWrongs);
                setShowResult(true);
            };

            return (
                <div className="min-h-screen">
                    {/* 列印視圖 */}
                    <div className="print-only p-10 text-black bg-white">
                        <div className="text-center mb-10 border-b-4 border-double border-black pb-6">
                            <h1 className="text-4xl font-black mb-2">金名魔法學院 - 幻化術修行報告</h1>
                            <div className="flex justify-between items-center text-lg mt-6 px-4">
                                <p><strong>修煉法師：</strong> {studentName || '___________'}</p>
                                <p><strong>法力評分：</strong> {score} 分</p>
                            </div>
                        </div>
                        <h2 className="text-2xl font-bold mb-6 italic underline">【 錯題強化修煉單 】</h2>
                        {wrongAnswers.length > 0 ? (
                            wrongAnswers.map((item, i) => (
                                <div key={i} className="border-2 border-gray-400 p-6 mb-6 rounded-xl">
                                    <p className="font-bold text-xl mb-4">法術第 {item.id} 關：{item.question}</p>
                                    <div className="grid grid-cols-2 gap-6 mb-4">
                                        <p className="text-red-600">✘ 錯誤咒語：{item.yourAnswer}</p>
                                        <p className="text-green-700">✔ 正確奧義：<strong>{item.correctAnswer}</strong></p>
                                    </div>
                                    <div className="bg-gray-100 p-3 rounded italic text-sm">
                                        <strong>導師指引：</strong>{item.hint}
                                    </div>
                                </div>
                            ))
                        ) : (
                            <div className="text-center py-20 border-2 border-dashed border-gray-400 rounded-3xl">
                                <p className="text-3xl font-black">恭喜！已掌握此卷所有奧義。</p>
                            </div>
                        )}
                    </div>

                    <div className="no-print">
                        <header className="bg-gradient-to-b from-[#1e1b4b] to-[#0f172a] border-b border-[#d4af37]/30 py-12 px-4 text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-full opacity-5 pointer-events-none">
                                <Icon name="sparkles" className="w-full h-full" />
                            </div>
                            <div className="inline-flex items-center gap-3 px-6 py-2 bg-[#d4af37]/10 rounded-full border border-[#d4af37]/50 mb-6 backdrop-blur-md">
                                <Icon name="scroll" className="w-5 h-5 text-[#d4af37]" />
                                <span className="text-[#d4af37] font-bold tracking-[0.2em] text-xs uppercase">Jinming Magic Academy</span>
                            </div>
                            <h1 className="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#d4af37] via-[#fef3c7] to-[#d4af37] drop-shadow-[0_5px_15px_rgba(212,175,55,0.3)] mb-4">
                                字形幻化術：二階奧義辨正
                            </h1>
                            <p className="text-indigo-300 font-medium tracking-wide">掌握核心部件，破解形近字之幻象</p>
                        </header>

                        <main className="max-w-6xl mx-auto px-4 py-12 pb-48">
                            <div className="flex flex-wrap justify-center gap-4 mb-12">
                                {[
                                    { id: 'library', label: '魔法圖書館', icon: 'library' },
                                    { id: 'strategy', label: '結構解析室', icon: 'binary' },
                                    { id: 'quiz', label: '100分試煉場', icon: 'flame' },
                                ].map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`flex items-center gap-3 px-8 py-4 rounded-2xl font-black transition-all duration-300 ${
                                            activeTab === tab.id 
                                            ? 'bg-[#d4af37] text-indigo-950 scale-105 shadow-[0_0_25px_rgba(212,175,55,0.4)]' 
                                            : 'bg-indigo-900/30 text-slate-400 hover:bg-indigo-900/50 border border-indigo-800/50'
                                        }`}
                                    >
                                        <Icon name={tab.icon} />
                                        {tab.label}
                                    </button>
                                ))}
                            </div>

                            {activeTab === 'library' && (
                                <div className="space-y-8 animate-in fade-in duration-500">
                                    <div className="flex flex-wrap gap-2 justify-center pb-8 border-b border-indigo-900/40">
                                        {groups.map(g => (
                                            <button
                                                key={g.id}
                                                onClick={() => setSelectedGroup(g.id)}
                                                className={`px-5 py-2.5 rounded-xl text-sm font-bold border transition-all ${
                                                    selectedGroup === g.id 
                                                    ? 'bg-indigo-600 border-indigo-400 text-white shadow-lg' 
                                                    : 'bg-indigo-950/40 border-indigo-800 text-slate-400 hover:border-[#d4af37]/40'
                                                }`}
                                            >
                                                {g.label}
                                            </button>
                                        ))}
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {filteredData.map((item, idx) => (
                                            <div key={idx} className="magic-card bg-indigo-950/40 border border-indigo-800/40 rounded-3xl p-6 transition-all backdrop-blur-sm group">
                                                <div className="flex justify-between items-start mb-4">
                                                    <div className="flex items-center gap-4">
                                                        <span className="text-5xl font-black text-[#d4af37] group-hover:scale-110 transition-transform">{item.char}</span>
                                                        <div className="bg-indigo-900/60 px-3 py-1 rounded-lg">
                                                            <span className="text-indigo-300 font-black text-sm">{item.pinyin}</span>
                                                        </div>
                                                    </div>
                                                    <Icon name="bookmark" className="text-indigo-800 w-4 h-4" />
                                                </div>
                                                <div className="space-y-4">
                                                    <p className="text-slate-200 text-sm font-medium leading-relaxed bg-indigo-900/20 p-3 rounded-xl border-l-4 border-[#d4af37]">
                                                        {item.meaning}
                                                    </p>
                                                    <div className="space-y-2">
                                                        <span className="text-[10px] text-[#d4af37] font-black tracking-widest uppercase opacity-70">魔法實例</span>
                                                        <p className="text-[#fef3c7] font-bold text-base leading-relaxed">{item.example}</p>
                                                        {item.note && (
                                                            <div className="mt-3 pt-3 border-t border-indigo-800/50">
                                                                <p className="text-indigo-300 text-xs italic leading-relaxed">
                                                                    <Icon name="info" className="inline w-3 h-3 mr-1" />
                                                                    {item.note}
                                                                </p>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'strategy' && (
                                <div className="max-w-5xl mx-auto space-y-10">
                                    <div className="grid md:grid-cols-2 gap-8">
                                        <div className="bg-[#fef3c7] text-indigo-950 p-10 rounded-[45px] shadow-2xl border-4 border-[#d4af37]/20 relative">
                                            <div className="absolute -top-4 -right-4 bg-[#d4af37] text-indigo-950 w-12 h-12 rounded-full flex items-center justify-center shadow-lg">
                                                <Icon name="zap" />
                                            </div>
                                            <h3 className="text-2xl font-black mb-8 flex items-center gap-3">
                                                <Icon name="layers" /> 核心部件幻化圖譜
                                            </h3>
                                            <div className="space-y-10">
                                                <div>
                                                    <div className="flex items-center gap-3 mb-4">
                                                        <div className="w-8 h-8 rounded-full bg-indigo-950 text-white flex items-center justify-center font-bold">1</div>
                                                        <h4 className="text-xl font-black">「奐」之變身 (ㄏㄨㄢˋ)</h4>
                                                    </div>
                                                    <div className="grid grid-cols-1 gap-3 pl-11">
                                                        {[
                                                            { key: '口', val: '喚', desc: '開口叫「喚」' },
                                                            { key: '疒', val: '瘓', desc: '病部癱「瘓」' },
                                                            { key: '手', val: '換', desc: '用手交「換」' },
                                                            { key: '火', val: '煥', desc: '火光閃「煥」' },
                                                            { key: '水', val: '渙', desc: '水散為「渙」' },
                                                        ].map((item, i) => (
                                                            <div key={i} className="bg-white/60 p-3 rounded-xl border border-indigo-200 flex justify-between items-center">
                                                                <span className="font-bold">{item.desc}</span>
                                                                <span className="text-2xl font-black text-indigo-800">{item.val}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="space-y-6">
                                            <div className="bg-indigo-900/40 border-2 border-[#d4af37]/30 p-10 rounded-[45px] backdrop-blur-md">
                                                <h3 className="text-2xl font-black mb-6 text-[#d4af37] flex items-center gap-3">
                                                    <Icon name="brain-circuit" /> 能量聯想筆記
                                                </h3>
                                                <div className="space-y-6">
                                                    <div className="p-5 bg-indigo-950/80 rounded-2xl border border-indigo-700">
                                                        <h4 className="font-bold text-[#fef3c7] mb-3 flex items-center gap-2">「喿」的核心聯覺</h4>
                                                        <div className="text-slate-300 text-sm space-y-3">
                                                            <p className="flex items-center gap-2"><span className="text-[#d4af37] font-black">口</span> 噪：聲音大為噪聲</p>
                                                            <p className="flex items-center gap-2"><span className="text-[#d4af37] font-black">足</span> 躁：腳不安分，急躁</p>
                                                            <p className="flex items-center gap-2"><span className="text-[#d4af37] font-black">火</span> 燥：火燒水乾，乾燥</p>
                                                            <p className="flex items-center gap-2"><span className="text-[#d4af37] font-black">肉</span> 臊：肉臭味或害臊</p>
                                                        </div>
                                                    </div>
                                                    <div className="p-5 bg-indigo-950/80 rounded-2xl border border-indigo-700">
                                                        <h4 className="font-bold text-[#fef3c7] mb-3">「樂」的幻化分支</h4>
                                                        <p className="text-slate-300 text-sm leading-loose">
                                                            火部 → <span className="text-white font-bold">爍</span> (閃亮亮)<br/>
                                                            金部 → <span className="text-white font-bold">鑠</span> (熔化金屬)<br/>
                                                            石部 → <span className="text-white font-bold">礫</span> (小石頭)
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'quiz' && (
                                <div className="max-w-4xl mx-auto">
                                    {!showResult ? (
                                        <div className="bg-indigo-950/60 border border-[#d4af37]/30 p-10 rounded-[50px] backdrop-blur-xl shadow-2xl relative">
                                            <div className="flex flex-wrap justify-center gap-3 mb-12 border-b border-indigo-800/50 pb-8">
                                                {quizData.map((_, i) => (
                                                    <button 
                                                        key={i} 
                                                        onClick={() => setQuizIndex(i)}
                                                        className={`w-12 h-12 flex items-center justify-center rounded-2xl font-black text-sm transition-all ${
                                                            i === quizIndex 
                                                                ? 'bg-[#d4af37] text-indigo-950 scale-110 shadow-lg' 
                                                                : userAnswers[i] !== undefined 
                                                                    ? 'bg-indigo-700 text-white' 
                                                                    : 'bg-indigo-900/40 text-indigo-400 border border-indigo-800/50'
                                                        }`}
                                                    >
                                                        {i + 1}
                                                    </button>
                                                ))}
                                            </div>

                                            <div className="mb-10">
                                                <div className="flex items-center gap-3 mb-6">
                                                    <div className="px-4 py-1.5 bg-[#d4af37]/20 rounded-full border border-[#d4af37]/30">
                                                        <span className="text-[#d4af37] font-black text-[10px] tracking-widest uppercase">試煉階段 {quizIndex + 1}/10</span>
                                                    </div>
                                                </div>
                                                <div className="bg-indigo-900/30 p-8 rounded-3xl border border-indigo-800 mb-10 italic text-indigo-100 text-xl font-medium leading-relaxed">
                                                    「{quizData[quizIndex].story}」
                                                </div>
                                                <p className="text-2xl font-black text-white mb-8">{quizData[quizIndex].q}</p>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                {quizData[quizIndex].options.map((opt, idx) => {
                                                    const isSelected = userAnswers[quizIndex] === idx;
                                                    return (
                                                        <button
                                                            key={idx}
                                                            onClick={() => handleSelectOption(idx)}
                                                            className={`w-full text-left p-6 rounded-3xl font-bold border-2 transition-all flex items-center justify-between group ${
                                                                isSelected 
                                                                    ? 'bg-[#d4af37]/20 border-[#d4af37] text-[#d4af37]' 
                                                                    : 'bg-indigo-950/40 border-indigo-800 hover:border-indigo-600 text-slate-400'
                                                            }`}
                                                        >
                                                            <span className="flex items-center gap-4">
                                                                <div className={`w-8 h-8 rounded-full border flex items-center justify-center text-xs font-black ${isSelected ? 'bg-[#d4af37] border-transparent text-indigo-950' : 'border-indigo-700 text-indigo-700'}`}>
                                                                    {String.fromCharCode(65 + idx)}
                                                                </div>
                                                                {opt}
                                                            </span>
                                                            {isSelected && <Icon name="check-circle" className="w-6 h-6" />}
                                                        </button>
                                                    );
                                                })}
                                            </div>

                                            <div className="mt-16 flex justify-between items-center pt-8 border-t border-indigo-800/50">
                                                <button disabled={quizIndex === 0} onClick={() => setQuizIndex(quizIndex - 1)} className="flex items-center gap-2 text-indigo-400 font-black disabled:opacity-20 hover:text-[#d4af37] transition-colors">
                                                    <Icon name="arrow-left-to-line" /> 回溯上一關
                                                </button>
                                                {Object.keys(userAnswers).length === quizData.length && (
                                                    <button onClick={calculateResults} className="bg-gradient-to-r from-[#d4af37] to-[#fef3c7] text-indigo-950 px-16 py-5 rounded-2xl font-black shadow-2xl hover:scale-105 transition-all animate-pulse">結算修煉奧義</button>
                                                )}
                                                <button disabled={quizIndex === quizData.length - 1} onClick={() => setQuizIndex(quizIndex + 1)} className="flex items-center gap-2 text-indigo-400 font-black disabled:opacity-20 hover:text-[#d4af37] transition-colors">
                                                    前往下一關 <Icon name="arrow-right-to-line" />
                                                </button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-10 animate-in zoom-in duration-500">
                                            <div className="text-center bg-gradient-to-b from-indigo-900/60 to-indigo-950/80 p-16 rounded-[60px] border-2 border-[#d4af37]/30 shadow-2xl relative overflow-hidden">
                                                <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                                                    <Icon name="trophy" className="w-full h-full" />
                                                </div>
                                                <div className="relative z-10">
                                                    <div className="text-[120px] leading-none font-black text-white mb-4 drop-shadow-lg">{score}</div>
                                                    <div className="text-3xl font-black text-[#fef3c7] mb-12 tracking-widest uppercase">
                                                        {score === 100 ? "✦ 奧義滿級：大魔導師 ✦" : "✦ 初試啼聲：繼續修煉 ✦"}
                                                    </div>
                                                    
                                                    <div className="max-w-md mx-auto mb-10">
                                                        <label className="block text-[#d4af37] text-xs font-black mb-3 text-left tracking-widest ml-1 uppercase">認證法師姓名</label>
                                                        <input 
                                                            type="text" 
                                                            value={studentName}
                                                            onChange={(e) => setStudentName(e.target.value)}
                                                            placeholder="請輸入你的法師名號..."
                                                            className="w-full bg-indigo-950/80 border-2 border-indigo-800/50 rounded-2xl py-5 px-6 focus:border-[#d4af37] outline-none text-white font-black text-lg shadow-inner text-center"
                                                        />
                                                    </div>

                                                    <div className="flex flex-wrap gap-4 justify-center">
                                                        <button onClick={() => window.print()} className="flex items-center gap-3 bg-white text-indigo-950 px-10 py-5 rounded-2xl font-black hover:scale-105 transition-all shadow-xl group">
                                                            <Icon name="printer" className="group-hover:rotate-12 transition-transform" /> 獲取修煉報告
                                                        </button>
                                                        <button onClick={() => { setShowResult(false); setUserAnswers({}); setQuizIndex(0); setScore(0); }} className="flex items-center gap-3 bg-indigo-800 text-white px-10 py-5 rounded-2xl font-black hover:scale-105 transition-all border border-indigo-700">
                                                            <Icon name="rotate-cw" /> 再度挑戰
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>

                                            {wrongAnswers.length > 0 && (
                                                <div className="bg-indigo-950/40 border border-indigo-800 rounded-[50px] p-12">
                                                    <h3 className="text-3xl font-black text-[#d4af37] mb-10 flex items-center gap-4">
                                                        <Icon name="file-warning" className="w-8 h-8" /> 幻化錯題解析
                                                    </h3>
                                                    <div className="grid grid-cols-1 gap-8">
                                                        {wrongAnswers.map((item, i) => (
                                                            <div key={i} className="bg-indigo-900/20 p-8 rounded-[35px] border border-indigo-800/60 relative group">
                                                                <div className="absolute -top-4 -left-4 bg-rose-600 text-white w-10 h-10 rounded-full flex items-center justify-center font-black shadow-lg">!</div>
                                                                <p className="font-black text-white mb-6 text-xl leading-relaxed">「{item.question}」</p>
                                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                                                                    <div className="bg-rose-500/10 p-5 rounded-2xl border border-rose-500/20 flex flex-col justify-center">
                                                                        <span className="text-[10px] text-rose-400 font-black uppercase mb-1 tracking-widest">失誤咒語</span>
                                                                        <span className="text-rose-200 font-bold opacity-60 line-through">{item.yourAnswer}</span>
                                                                    </div>
                                                                    <div className="bg-emerald-500/10 p-5 rounded-2xl border border-emerald-500/20 flex flex-col justify-center">
                                                                        <span className="text-[10px] text-emerald-400 font-black uppercase mb-1 tracking-widest">正確奧義</span>
                                                                        <span className="text-emerald-100 font-black text-lg">{item.correctAnswer}</span>
                                                                    </div>
                                                                </div>
                                                                <div className="bg-[#d4af37]/5 p-6 rounded-2xl border border-[#d4af37]/20 flex gap-4 text-sm text-[#d4af37] font-bold italic leading-relaxed">
                                                                    <Icon name="wand" className="w-5 h-5 shrink-0" />
                                                                    <p>{item.hint}</p>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}
                        </main>

                        <footer className="fixed bottom-0 left-0 right-0 bg-indigo-950/90 backdrop-blur-xl border-t border-[#d4af37]/20 p-6 z-50">
                            <div className="max-w-6xl mx-auto flex items-center justify-between">
                                <div className="flex items-center gap-6">
                                    <div className="p-3 bg-[#d4af37] rounded-2xl shadow-[0_0_15px_rgba(212,175,55,0.4)]">
                                        <Icon name="shield-check" className="text-indigo-950 w-6 h-6" />
                                    </div>
                                    <div className="hidden lg:block">
                                        <p className="text-[10px] font-black text-[#d4af37] uppercase tracking-[0.3em] mb-2 leading-none">Jinming Magic Research</p>
                                        <div className="flex gap-2">
                                            {[1, 2, 3].map(i => (
                                                <div key={i} className={`h-1.5 rounded-full transition-all duration-500 ${activeTab === ['library', 'strategy', 'quiz'][i-1] ? 'bg-[#d4af37] w-10' : 'bg-indigo-800 w-4'}`}></div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div className="flex items-center gap-10">
                                    <div className="text-right">
                                        <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">當前修煉法力值</p>
                                        <p className="text-3xl font-black text-[#d4af37] leading-none tracking-tighter">{score}</p>
                                    </div>
                                    <button 
                                        className="bg-indigo-900/50 hover:bg-[#d4af37] hover:text-indigo-950 border border-[#d4af37]/40 px-8 py-3.5 rounded-2xl text-xs font-black text-[#d4af37] transition-all flex items-center gap-3 shadow-lg group"
                                        onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}
                                    >
                                        回到卷首 <Icon name="arrow-up" className="w-4 h-4 group-hover:-translate-y-1 transition-transform" />
                                    </button>
                                </div>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
