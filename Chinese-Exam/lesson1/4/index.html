<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金名魔法學院 - 形似字幻化術</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX Parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0f172a;
        }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; color: black !important; }
        }
        .print-only { display: none; }
        
        /* 魔法發光效果 */
        .magic-glow {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }
        .magic-card:hover {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
            transform: translateY(-4px);
        }
    </style>
</head>
<body class="text-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            const [svg, setSvg] = React.useState('');
            React.useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    const iconSvg = window.lucide.icons[name].toSvg({
                        class: className,
                        ...props
                    });
                    setSvg(iconSvg);
                }
            }, [name, className]);
            return <span dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('library');
            const [selectedGroup, setSelectedGroup] = useState('all');
            const [searchTerm, setSearchTerm] = useState('');
            const [quizIndex, setQuizIndex] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [score, setScore] = useState(0);
            const [userAnswers, setUserAnswers] = useState({});
            const [wrongAnswers, setWrongAnswers] = useState([]);
            const [studentName, setStudentName] = useState('');

            const groups = [
                { id: 'all', label: '全部咒語' },
                { id: 'g1', label: '締/諦' },
                { id: 'g2', label: '密/蜜' },
                { id: 'g3', label: '偃/堰/揠' },
                { id: 'g4', label: '衷/哀/衰' },
                { id: 'g5', label: '績/積/蹟/漬/嘖' },
                { id: 'g6', label: '躁/燥/噪' },
                { id: 'g7', label: '序/慕/墓/募/暮' }
            ];

            const magicData = [
                { char: '締', pinyin: 'ㄉㄧˋ', meaning: '結、結合', example: '「締」結、取締', groupId: 'g1' },
                { char: '諦', pinyin: 'ㄉㄧˋ', meaning: '道理、義理', example: '真「諦」', groupId: 'g1' },
                { char: '密', pinyin: 'ㄇㄧˋ', meaning: '不應洩露的 / 稠密', example: '祕「密」、親密', groupId: 'g2' },
                { char: '蜜', pinyin: 'ㄇㄧˋ', meaning: '採花液釀成的甜汁', example: '蜂「蜜」、甜蜜', groupId: 'g2' },
                { char: '揠', pinyin: 'ㄧㄚˋ', meaning: '拉、拔', example: '「揠」苗助長', groupId: 'g3' },
                { char: '堰', pinyin: 'ㄧㄢˋ', meaning: '擋水的土堤', example: '都江「堰」', groupId: 'g3' },
                { char: '偃', pinyin: 'ㄧㄢˇ', meaning: '仆倒、倒伏', example: '風行草「偃」', groupId: 'g3' },
                { char: '衷', pinyin: 'ㄓㄨㄥ', meaning: '內心', example: '言不由「衷」', groupId: 'g4' },
                { char: '哀', pinyin: 'ㄞ', meaning: '悲傷難過', example: '「哀」傷', groupId: 'g4' },
                { char: '衰', pinyin: 'ㄕㄨㄞ', meaning: '由強盛變弱', example: '「衰」弱、衰敗', groupId: 'g4' },
                { char: '績', pinyin: 'ㄐㄧ', meaning: '功業、成效', example: '成「績」', groupId: 'g5' },
                { char: '積', pinyin: 'ㄐㄧ', meaning: '累聚、聚集', example: '累「積」', groupId: 'g5' },
                { char: '蹟', pinyin: 'ㄐㄧ', meaning: '前人留下的事物', example: '古「蹟」、事蹟', groupId: 'g5' },
                { char: '漬', pinyin: 'ㄗˋ', meaning: '積留的污痕', example: '汙「漬」', groupId: 'g5' },
                { char: '嘖', pinyin: 'ㄗㄜˊ', meaning: '讚嘆、驚奇的聲音', example: '「嘖嘖」稱奇', groupId: 'g5' },
                { char: '躁', pinyin: 'ㄗㄠˋ', meaning: '性急、不冷靜', example: '煩「躁」、急躁', groupId: 'g6' },
                { char: '燥', pinyin: 'ㄗㄠˋ', meaning: '缺乏水分的', example: '乾「燥」', groupId: 'g6' },
                { char: '噪', pinyin: 'ㄗㄠˋ', meaning: '嘈雜、刺耳的聲音', example: '「噪」音、蟬噪', groupId: 'g6' },
                { char: '序', pinyin: 'ㄒㄩˋ', meaning: '事情的開始', example: '「序」幕', groupId: 'g7' },
                { char: '慕', pinyin: 'ㄇㄨˋ', meaning: '愛羨、敬仰', example: '羨「慕」、愛慕', groupId: 'g7' },
                { char: '墓', pinyin: 'ㄇㄨˋ', meaning: '埋葬死者的地方', example: '墳「墓」', groupId: 'g7' },
                { char: '募', pinyin: 'ㄇㄨˋ', meaning: '廣求、召集', example: '「募」款', groupId: 'g7' },
                { char: '暮', pinyin: 'ㄇㄨˋ', meaning: '傍晚、太陽下山', example: '朝思「暮」想、日暮', groupId: 'g7' },
            ];

            const quizData = [
                { story: "你正在解讀古老的法典，長老問你：『道理、義理』是指什麼？", q: "真(  ) —— 道理、義理", options: ["諦", "締"], correct: 0, hint: "諦(ㄉㄧˋ)指真理；締(ㄉㄧˋ)則是連結，如締造。" },
                { story: "守護精靈不小心把魔法藥水灑在法袍上，留下難看的痕跡：", q: "汙(  ) —— 積留在物體上的汙痕", options: ["積", "蹟", "漬", "績"], correct: 2, hint: "漬(ㄗˋ)指污痕，有水部。" },
                { story: "在都江堰的防禦工事中，我們使用了擋水的：", q: "都江(  ) —— 擋水的土堤", options: ["偃", "堰", "揠"], correct: 1, hint: "堰(ㄧㄢˋ)是土堤，有土部。" },
                { story: "這封魔法信件的內容非常『言不由衷』，意思是：", q: "(  )言不由衷 —— 內心", options: ["哀", "衷", "衰"], correct: 1, hint: "衷(ㄓㄨㄥ)指內心。" },
                { story: "夕陽西下，法師正在感嘆一天的結束：", q: "朝思(  )想 —— 傍晚", options: ["慕", "墓", "募", "暮"], correct: 3, hint: "暮(ㄇㄨˋ)下方為日，代表太陽落山。" },
                { story: "這件魔法古物非常有歷史價值：", q: "古(  ) —— 前人留下來的事務", options: ["蹟", "績", "積", "漬"], correct: 0, hint: "蹟(ㄐㄧ)指足跡、痕跡，足部。" },
                { story: "為了建立新的圖書館，我們正在進行集資：", q: "(  )款 —— 廣求、召集", options: ["慕", "墓", "募", "暮"], correct: 2, hint: "募(ㄇㄨˋ)下方為力，募款需出力。" },
                { story: "天氣太熱，森林裡的植物都乾枯了：", q: "乾(  ) —— 缺乏水分的", options: ["躁", "燥", "噪"], correct: 1, hint: "燥(ㄗㄠˋ)與火、乾旱相關。" },
                { story: "魔法實驗失敗後，學徒的心情變得很不冷靜：", q: "煩(  ) —— 性急、不冷靜", options: ["躁", "燥", "噪"], correct: 0, hint: "躁(ㄗㄠˋ)與腳踏(足)不安相關。" },
                { story: "在莊嚴的慶典中，法師揭開了活動的：", q: "(  )幕 —— 事情的開始", options: ["序", "慕", "暮"], correct: 0, hint: "序(ㄒㄩˋ)指開端。" }
            ];

            const filteredData = magicData.filter(d => {
                const matchesSearch = d.char.includes(searchTerm) || d.meaning.includes(searchTerm) || d.example.includes(searchTerm);
                const matchesGroup = selectedGroup === 'all' || d.groupId === selectedGroup;
                return matchesSearch && matchesGroup;
            });

            const handleSelectOption = (optionIdx) => {
                setUserAnswers(prev => ({ ...prev, [quizIndex]: optionIdx }));
                if (quizIndex < quizData.length - 1) {
                    setTimeout(() => setQuizIndex(quizIndex + 1), 400);
                }
            };

            const calculateResults = () => {
                let finalScore = 0;
                const finalWrongs = [];
                quizData.forEach((q, idx) => {
                    if (userAnswers[idx] === q.correct) {
                        finalScore += 10;
                    } else {
                        finalWrongs.push({
                            id: idx + 1,
                            question: q.q,
                            yourAnswer: userAnswers[idx] !== undefined ? q.options[userAnswers[idx]] : "未作答",
                            correctAnswer: q.options[q.correct],
                            hint: q.hint
                        });
                    }
                });
                setScore(finalScore);
                setWrongAnswers(finalWrongs);
                setShowResult(true);
            };

            return (
                <div className="min-h-screen">
                    {/* 列印視圖 */}
                    <div className="print-only p-10 text-black bg-white">
                        <div className="text-center mb-10 border-b-2 border-black pb-4">
                            <h1 className="text-3xl font-bold">金名魔法學院 - 字形修行記錄</h1>
                            <div className="flex justify-between mt-4">
                                <p>法師：{studentName || '見習者'}</p>
                                <p>修行得分：{score}</p>
                            </div>
                        </div>
                        {wrongAnswers.map((item, i) => (
                            <div key={i} className="mb-6 p-4 border rounded">
                                <p className="font-bold">第{item.id}題：{item.question}</p>
                                <p>❌ 錯誤：{item.yourAnswer} | ✅ 正確：{item.correctAnswer}</p>
                                <p className="text-sm italic mt-2">奧義：{item.hint}</p>
                            </div>
                        ))}
                    </div>

                    <div className="no-print">
                        <header className="bg-gradient-to-b from-[#1e1b4b] to-[#0f172a] border-b border-[#d4af37]/30 py-12 px-4 text-center">
                            <div className="inline-flex items-center gap-3 px-6 py-2 bg-[#d4af37]/10 rounded-full border border-[#d4af37]/50 mb-6">
                                <Icon name="wand-2" className="text-[#d4af37]" />
                                <span className="text-[#d4af37] font-bold tracking-widest text-sm uppercase">形似字強化卷 ‧ 基礎題</span>
                            </div>
                            <h1 className="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#d4af37] via-[#fef3c7] to-[#d4af37] mb-4">
                                字形幻化術：二階修煉
                            </h1>
                            <p className="text-indigo-300 font-medium tracking-wide">辨析字形微差，凝聚正確咒力</p>
                        </header>

                        <main className="max-w-6xl mx-auto px-4 py-10 pb-32">
                            {/* Tabs */}
                            <div className="flex flex-wrap justify-center gap-4 mb-12">
                                {[
                                    { id: 'library', label: '魔法圖書館', icon: 'book-open' },
                                    { id: 'strategy', label: '字根奧義析', icon: 'sparkles' },
                                    { id: 'quiz', label: '100分試煉', icon: 'shield-check' },
                                ].map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`flex items-center gap-2 px-8 py-4 rounded-2xl font-black transition-all ${
                                            activeTab === tab.id 
                                            ? 'bg-[#d4af37] text-indigo-950 scale-105 shadow-[0_0_20px_rgba(212,175,55,0.4)]' 
                                            : 'bg-indigo-900/30 text-slate-400 hover:bg-indigo-900/50 border border-indigo-800'
                                        }`}
                                    >
                                        <Icon name={tab.icon} />
                                        {tab.label}
                                    </button>
                                ))}
                            </div>

                            {activeTab === 'library' && (
                                <div className="space-y-8 animate-in fade-in duration-500">
                                    <div className="flex flex-wrap gap-2 justify-center pb-8 border-b border-indigo-900/50">
                                        {groups.map(g => (
                                            <button
                                                key={g.id}
                                                onClick={() => setSelectedGroup(g.id)}
                                                className={`px-4 py-2 rounded-xl text-sm font-bold border transition-all ${
                                                    selectedGroup === g.id 
                                                    ? 'bg-indigo-600 border-indigo-400 text-white' 
                                                    : 'bg-indigo-950/50 border-indigo-800 text-slate-400 hover:border-[#d4af37]/30'
                                                }`}
                                            >
                                                {g.label}
                                            </button>
                                        ))}
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {filteredData.map((item, idx) => (
                                            <div key={idx} className="magic-card bg-indigo-950/40 border border-indigo-800/50 rounded-[32px] p-6 transition-all backdrop-blur-sm relative overflow-hidden group">
                                                <div className="flex justify-between items-start mb-4">
                                                    <div className="text-5xl font-black text-[#d4af37]">{item.char}</div>
                                                    <div className="bg-indigo-900/80 px-3 py-1 rounded-lg text-indigo-300 text-xs font-bold tracking-widest">{item.pinyin}</div>
                                                </div>
                                                <p className="text-slate-300 font-medium mb-4 text-sm leading-relaxed border-l-2 border-[#d4af37]/30 pl-3">
                                                    {item.meaning}
                                                </p>
                                                <div className="bg-white/5 p-4 rounded-2xl border border-white/10">
                                                    <span className="text-[10px] text-[#d4af37] font-black uppercase block mb-1">咒語例句</span>
                                                    <p className="text-[#fef3c7] font-bold text-sm">{item.example}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'strategy' && (
                                <div className="grid md:grid-cols-2 gap-8 animate-in slide-in-from-bottom duration-500">
                                    <div className="bg-[#fef3c7] text-indigo-950 p-10 rounded-[48px] shadow-2xl border-4 border-[#d4af37]/20">
                                        <h3 className="text-2xl font-black mb-8 flex items-center gap-3">
                                            <Icon name="scroll" className="text-[#d4af37] w-8 h-8" /> 核心字根辨正
                                        </h3>
                                        <div className="space-y-8">
                                            <section>
                                                <h4 className="text-xl font-black text-indigo-800 border-b border-indigo-200 pb-2 mb-4">莫 (ㄇㄨˋ) 系魔法</h4>
                                                <ul className="space-y-4 text-sm">
                                                    <li className="flex gap-4">
                                                        <span className="text-2xl font-black w-8">慕</span>
                                                        <span>下為「心」，因為羨慕是內心的情感。</span>
                                                    </li>
                                                    <li className="flex gap-4">
                                                        <span className="text-2xl font-black w-8">墓</span>
                                                        <span>下為「土」，代表埋葬入土的地方。</span>
                                                    </li>
                                                    <li className="flex gap-4">
                                                        <span className="text-2xl font-black w-8">募</span>
                                                        <span>下為「力」，代表需要集結大家的力量。</span>
                                                    </li>
                                                    <li className="flex gap-4">
                                                        <span className="text-2xl font-black w-8">暮</span>
                                                        <span>下為「日」，代表太陽下山的傍晚。</span>
                                                    </li>
                                                </ul>
                                            </section>
                                            <section>
                                                <h4 className="text-xl font-black text-indigo-800 border-b border-indigo-200 pb-2 mb-4">尞 (ㄗㄠˋ) 系魔法</h4>
                                                <ul className="space-y-4 text-sm">
                                                    <li className="flex gap-4">
                                                        <span className="text-2xl font-black w-8">躁</span>
                                                        <span>左為「足」，形容腳踏不安、性急煩躁。</span>
                                                    </li>
                                                    <li className="flex gap-4">
                                                        <span className="text-2xl font-black w-8">燥</span>
                                                        <span>左為「火」，與乾旱、缺乏水分相關。</span>
                                                    </li>
                                                    <li className="flex gap-4">
                                                        <span className="text-2xl font-black w-8">噪</span>
                                                        <span>左為「口」，與嘈雜、刺耳的聲音相關。</span>
                                                    </li>
                                                </ul>
                                            </section>
                                        </div>
                                    </div>
                                    <div className="space-y-6">
                                        <div className="bg-indigo-900/40 p-8 rounded-[48px] border-2 border-[#d4af37]/20 backdrop-blur-md">
                                            <h3 className="text-xl font-black text-[#d4af37] mb-6 flex items-center gap-2"><Icon name="lightbulb" /> 高階聯想法</h3>
                                            <div className="space-y-4">
                                                <div className="p-5 bg-indigo-950/80 rounded-2xl border border-indigo-700">
                                                    <h5 className="text-[#fef3c7] font-black mb-1">揠苗助長</h5>
                                                    <p className="text-xs text-slate-400">揠(ㄧㄚˋ)是用「手」去拔苗，所以是手部。</p>
                                                </div>
                                                <div className="p-5 bg-indigo-950/80 rounded-2xl border border-indigo-700">
                                                    <h5 className="text-[#fef3c7] font-black mb-1">都江堰</h5>
                                                    <span>堰(ㄧㄢˋ)是用「土」堆起來的堤防。</span>
                                                </div>
                                                <div className="p-5 bg-indigo-950/80 rounded-2xl border border-indigo-700">
                                                    <h5 className="text-[#fef3c7] font-black mb-1">古蹟</h5>
                                                    <span>蹟(ㄐㄧ)是留下的足跡，所以是足部。</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'quiz' && (
                                <div className="max-w-4xl mx-auto">
                                    {!showResult ? (
                                        <div className="bg-indigo-950/60 border border-[#d4af37]/30 p-10 rounded-[48px] backdrop-blur-xl shadow-2xl">
                                            <div className="flex flex-wrap justify-center gap-3 mb-10">
                                                {quizData.map((_, i) => (
                                                    <button 
                                                        key={i} 
                                                        onClick={() => setQuizIndex(i)}
                                                        className={`w-10 h-10 rounded-xl font-black text-xs transition-all ${
                                                            i === quizIndex 
                                                            ? 'bg-[#d4af37] text-indigo-950 shadow-[0_0_15px_rgba(212,175,55,0.4)] scale-110' 
                                                            : userAnswers[i] !== undefined 
                                                                ? 'bg-indigo-600 text-white' 
                                                                : 'bg-indigo-900/40 text-indigo-700 border border-indigo-800'
                                                        }`}
                                                    >
                                                        {i + 1}
                                                    </button>
                                                ))}
                                            </div>

                                            <div className="mb-12 text-center">
                                                <div className="text-[#d4af37] text-xs font-black uppercase tracking-[0.2em] mb-4">—— 第 {quizIndex + 1} 關 ‧ 幻化試煉 ——</div>
                                                <p className="text-indigo-200 text-lg italic mb-6">「{quizData[quizIndex].story}」</p>
                                                <h2 className="text-3xl font-black text-white">{quizData[quizIndex].q}</h2>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {quizData[quizIndex].options.map((opt, idx) => (
                                                    <button
                                                        key={idx}
                                                        onClick={() => handleSelectOption(idx)}
                                                        className={`p-6 rounded-3xl font-black border-2 transition-all flex items-center justify-between group ${
                                                            userAnswers[quizIndex] === idx 
                                                            ? 'bg-[#d4af37]/20 border-[#d4af37] text-[#d4af37]' 
                                                            : 'bg-indigo-950/40 border-indigo-800 hover:border-[#d4af37]/50 text-slate-400'
                                                        }`}
                                                    >
                                                        <span className="flex items-center gap-4">
                                                            <div className="w-8 h-8 rounded-lg bg-indigo-900 flex items-center justify-center text-xs text-[#d4af37]">
                                                                {String.fromCharCode(65 + idx)}
                                                            </div>
                                                            {opt}
                                                        </span>
                                                        {userAnswers[quizIndex] === idx && <Icon name="check-circle" className="text-[#d4af37]" />}
                                                    </button>
                                                ))}
                                            </div>

                                            <div className="mt-12 flex justify-between items-center border-t border-indigo-900/50 pt-8">
                                                <button disabled={quizIndex === 0} onClick={() => setQuizIndex(quizIndex - 1)} className="text-indigo-400 font-bold disabled:opacity-20 flex items-center gap-2">
                                                    <Icon name="chevron-left" /> 上一境界
                                                </button>
                                                {Object.keys(userAnswers).length === quizData.length && (
                                                    <button onClick={calculateResults} className="bg-[#d4af37] text-indigo-950 px-12 py-4 rounded-2xl font-black shadow-xl hover:scale-105 transition-all">
                                                        提交幻化奧義
                                                    </button>
                                                )}
                                                <button disabled={quizIndex === quizData.length - 1} onClick={() => setQuizIndex(quizIndex + 1)} className="text-indigo-400 font-bold disabled:opacity-20 flex items-center gap-2">
                                                    下一境界 <Icon name="chevron-right" />
                                                </button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-8 pb-10">
                                            <div className="text-center bg-indigo-950/60 border border-[#d4af37]/30 p-12 rounded-[56px] shadow-2xl relative overflow-hidden">
                                                <div className="relative z-10">
                                                    <div className="text-8xl font-black text-white mb-2">{score} <span className="text-2xl text-[#d4af37]">分</span></div>
                                                    <div className="text-2xl font-black text-[#fef3c7] mb-8">{score === 100 ? "大魔導師級 ‧ 完美掌握" : "修行尚未圓滿，再接再厲"}</div>
                                                    
                                                    <div className="max-w-xs mx-auto mb-8">
                                                        <input 
                                                            type="text" 
                                                            value={studentName}
                                                            onChange={(e) => setStudentName(e.target.value)}
                                                            placeholder="輸入法師姓名製作記錄..."
                                                            className="w-full bg-indigo-900/50 border border-indigo-700 rounded-2xl py-4 px-6 focus:border-[#d4af37] outline-none text-white text-center font-bold"
                                                        />
                                                    </div>

                                                    <div className="flex flex-wrap gap-4 justify-center">
                                                        <button onClick={() => window.print()} className="bg-white text-indigo-950 px-10 py-4 rounded-2xl font-black shadow-xl flex items-center gap-2 hover:scale-105 transition-all">
                                                            <Icon name="printer" /> 列印修行記錄
                                                        </button>
                                                        <button onClick={() => { setShowResult(false); setUserAnswers({}); setQuizIndex(0); }} className="bg-indigo-800 text-white px-10 py-4 rounded-2xl font-black flex items-center gap-2 border border-indigo-600">
                                                            <Icon name="rotate-ccw" /> 重新修煉
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>

                                            {wrongAnswers.length > 0 && (
                                                <div className="bg-indigo-950/40 border border-rose-500/20 rounded-[48px] p-10">
                                                    <h3 className="text-2xl font-black text-rose-400 mb-8 flex items-center gap-3">
                                                        <Icon name="alert-triangle" /> 需要再次研習的咒語
                                                    </h3>
                                                    <div className="space-y-6">
                                                        {wrongAnswers.map((item, i) => (
                                                            <div key={i} className="bg-indigo-900/30 p-8 rounded-3xl border border-indigo-800 transition-all hover:border-rose-500/30">
                                                                <p className="font-black text-[#fef3c7] mb-4 text-xl">{item.question}</p>
                                                                <div className="flex flex-wrap gap-4 mb-4">
                                                                    <div className="bg-rose-500/10 px-4 py-2 rounded-xl border border-rose-500/30 text-rose-300 text-sm">
                                                                        ❌ 你的選擇：<span className="line-through">{item.yourAnswer}</span>
                                                                    </div>
                                                                    <div className="bg-emerald-500/10 px-4 py-2 rounded-xl border border-emerald-500/30 text-emerald-300 text-sm">
                                                                        ✅ 正確咒語：{item.correctAnswer}
                                                                    </div>
                                                                </div>
                                                                <p className="text-indigo-400 text-sm bg-indigo-950/50 p-4 rounded-xl border border-indigo-800">
                                                                    <span className="font-black text-[#d4af37]">魔法提示：</span>{item.hint}
                                                                </p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}
                        </main>

                        <footer className="fixed bottom-0 left-0 right-0 bg-indigo-950/90 backdrop-blur-xl border-t border-[#d4af37]/20 p-6 z-50">
                            <div className="max-w-6xl mx-auto flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 rounded-2xl bg-indigo-800 flex items-center justify-center border border-[#d4af37]/30 shadow-lg">
                                        <Icon name="graduation-cap" className="text-[#d4af37]" />
                                    </div>
                                    <div className="hidden sm:block">
                                        <p className="text-[10px] font-black text-[#d4af37] tracking-[0.3em] uppercase mb-1">Jinming Magic Academy</p>
                                        <div className="flex gap-2">
                                            <div className={`h-1 rounded-full transition-all duration-500 ${activeTab === 'library' ? 'w-10 bg-[#d4af37]' : 'w-4 bg-indigo-800'}`}></div>
                                            <div className={`h-1 rounded-full transition-all duration-500 ${activeTab === 'strategy' ? 'w-10 bg-[#d4af37]' : 'w-4 bg-indigo-800'}`}></div>
                                            <div className={`h-1 rounded-full transition-all duration-500 ${activeTab === 'quiz' ? 'w-10 bg-[#d4af37]' : 'w-4 bg-indigo-800'}`}></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex items-center gap-6">
                                    <div className="text-right">
                                        <p className="text-[10px] font-bold text-indigo-400 mb-1">修煉進度</p>
                                        <p className="text-2xl font-black text-[#d4af37] leading-none">{Object.keys(userAnswers).length} / 10</p>
                                    </div>
                                    <button 
                                        className="bg-gradient-to-r from-indigo-800 to-indigo-900 px-6 py-3 rounded-2xl text-xs font-black text-[#d4af37] border border-[#d4af37]/30 hover:scale-105 transition-all shadow-lg flex items-center gap-2 group"
                                        onClick={() => window.open('https://www.google.com/search?q=形似字練習', '_blank')}
                                    >
                                        進階秘籍 <Icon name="external-link" className="w-3 h-3 group-hover:translate-y-[-2px] group-hover:translate-x-[2px] transition-transform" />
                                    </button>
                                </div>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
