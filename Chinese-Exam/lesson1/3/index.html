<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金名魔法學院 - 幻影移形術</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX Parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0f172a;
        }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; color: black !important; }
        }
        .print-only { display: none; }
        .magic-shadow {
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
    </style>
</head>
<body class="bg-[#0f172a] text-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            const [svg, setSvg] = React.useState('');
            React.useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    const iconSvg = window.lucide.icons[name].toSvg({
                        class: className,
                        ...props
                    });
                    setSvg(iconSvg);
                }
            }, [name, className]);
            return <span dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('library');
            const [selectedGroup, setSelectedGroup] = useState('all');
            const [searchTerm, setSearchTerm] = useState('');
            const [quizIndex, setQuizIndex] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [score, setScore] = useState(0);
            const [userAnswers, setUserAnswers] = useState({});
            const [wrongAnswers, setWrongAnswers] = useState([]);
            const [studentName, setStudentName] = useState('');

            const groups = [
                { id: 'all', label: '全部咒語' },
                { id: 'mu', label: '幕 / 摹 / 墓 核心' },
                { id: 'ying', label: '螢 / 瑩 / 縈 核心' },
                { id: 'ning', label: '獰 / 擰 / 濘 核心' },
                { id: 'yan', label: '厭 / 饜 / 魘 核心' },
                { id: 'special', label: '特殊幻化' }
            ];

            const magicData = [
                { char: '墓', pinyin: 'ㄇㄨˋ', meaning: '埋葬死者的土地', example: '墳「墓」、「墓」地', groupId: 'mu' },
                { char: '暮', pinyin: 'ㄇㄨˋ', meaning: '傍晚、太陽落山時', example: '「暮」春、朝思「暮」想', groupId: 'mu' },
                { char: '慕', pinyin: 'ㄇㄨˋ', meaning: '心中嚮往、喜愛', example: '羨「慕」、仰「慕」', groupId: 'mu' },
                { char: '幕', pinyin: 'ㄇㄨˋ', meaning: '遮蔽空間用的布料', example: '帷「幕」、開「幕」', groupId: 'mu' },
                { char: '募', pinyin: 'ㄇㄨˋ', meaning: '廣求、招集', example: '「募」款、「募」集', groupId: 'mu' },
                { char: '摹', pinyin: 'ㄇㄛˊ', meaning: '仿效、模擬', example: '臨「摹」、「摹」寫', groupId: 'mu' },
                { char: '驀', pinyin: 'ㄇㄛˋ', meaning: '忽然、突然', example: '「驀」然回首', groupId: 'mu' },
                { char: '螢', pinyin: 'ㄧㄥˊ', meaning: '鞘翅目昆蟲', example: '「螢」火蟲', groupId: 'ying' },
                { char: '瑩', pinyin: 'ㄧㄥˊ', meaning: '光亮、透明的樣子', example: '晶「瑩」剔透', groupId: 'ying' },
                { char: '營', pinyin: 'ㄧㄥˊ', meaning: '籌畫、建設', example: '「營」利、造「營」', groupId: 'ying' },
                { char: '縈', pinyin: 'ㄧㄥˊ', meaning: '旋繞、纏繞', example: '「縈」繞、魂牽夢「縈」', groupId: 'ying' },
                { char: '獰', pinyin: 'ㄋㄧㄥˊ', meaning: '凶惡的樣子', example: '猙「獰」', groupId: 'ning' },
                { char: '擰', pinyin: 'ㄋㄧㄥˇ', meaning: '手指夾住扭轉', example: '「擰」乾、擰肉', groupId: 'ning' },
                { char: '濘', pinyin: 'ㄋㄧㄥˋ', meaning: '雨後水土混合', example: '泥「濘」', groupId: 'ning' },
                { char: '厭', pinyin: 'ㄧㄢˋ', meaning: '憎惡、嫌棄', example: '討「厭」、厭「惡」', groupId: 'yan' },
                { char: '饜', pinyin: 'ㄧㄢˋ', meaning: '吃飽、滿足', example: '飽「饜」、貪得無「饜」', groupId: 'yan' },
                { char: '魘', pinyin: 'ㄧㄢˇ', meaning: '惡夢、睡眠中的驚恐', example: '夢「魘」', groupId: 'yan' },
                { char: '囑', pinyin: 'ㄓㄨˇ', meaning: '吩咐、叮嚀', example: '「囑」託、「囑」咐', groupId: 'special' },
                { char: '矚', pinyin: 'ㄓㄨˇ', meaning: '注視、重視', example: '眾所「矚」目', groupId: 'special' },
                { char: '遂', pinyin: 'ㄙㄨㄟˋ', meaning: '就、於是 / 順從', example: '「遂」至、半身不「遂」', groupId: 'special' },
                { char: '逐', pinyin: 'ㄓㄨˊ', meaning: '追趕 / 漸漸的', example: '「逐」漸、追「逐」', groupId: 'special' },
                { char: '遼', pinyin: 'ㄌㄧㄠˊ', meaning: '深遠的樣子', example: '深「遼」(眼神/大海)', groupId: 'special' },
                { char: '揠', pinyin: 'ㄧㄚˋ', meaning: '拉、拔', example: '「揠」苗助長', groupId: 'special' },
                { char: '偃', pinyin: 'ㄧㄢˇ', meaning: '仰臥、倒下', example: '「偃」旗息鼓', groupId: 'special' },
                { char: '堰', pinyin: 'ㄧㄢˋ', meaning: '擋水的土堤', example: '都江「堰」', groupId: 'special' },
                { char: '鎖', pinyin: 'ㄙㄨㄛˇ', meaning: '金屬鎖具', example: '「鎖」匙、加「鎖」', groupId: 'special' },
                { char: '瑣', pinyin: 'ㄙㄨㄛˇ', meaning: '細小、細微', example: '「瑣」事、「瑣」碎', groupId: 'special' },
                { char: '靨', pinyin: 'ㄧㄝˋ', meaning: '酒窩', example: '笑「靨」', groupId: 'special' },
                { char: '嫵', pinyin: 'ㄨˇ', meaning: '姿態嬌美可愛', example: '「嫵」媚', groupId: 'special' },
                { char: '蕪', pinyin: 'ㄨˊ', meaning: '繁雜的事物', example: '去「蕪」存菁', groupId: 'special' },
                { char: '撫', pinyin: 'ㄈㄨˇ', meaning: '輕輕的摸/拍', example: '「撫」摸、掌而笑', groupId: 'special' },
            ];

            const quizData = [
                { story: "當法師想要描寫一個人笑起來臉頰上有可愛的小酒窩時...", q: "請問『笑(  )』應該填入哪個字？", options: ["厭", "靨", "魘", "饜"], correct: 1, hint: "提示：靨 (ㄧㄝˋ) 指臉上的酒窩。下方的『面』與臉部相關。" },
                { story: "在魔法戰場上，雙方停止戰鬥並隱藏旗鼓，這稱為：", q: "『(  )旗息鼓』的正確用字是？", options: ["揠", "偃", "堰", "渰"], correct: 1, hint: "提示：偃 (ㄧㄢˇ) 代表倒下、臥倒。" },
                { story: "形容一個地方的水土在雨後非常濕滑且難以行走：", q: "下列關於『ㄋㄧㄥˋ』的用法何者正確？", options: ["猙『濘』", "『濘』乾", "泥『濘』", "『擰』笑"], correct: 2, hint: "提示：濘 (ㄋㄧㄥˋ) 指泥土與水混合。" },
                { story: "大法師對弟子叮嚀重要事項，這稱為：", q: "『囑託』的『囑』與『矚目』的『矚』，差別在於？", options: ["矚：口部 / 囑：目部", "囑：口部 / 矚：目部", "兩字通用", "囑：手部 / 矚：口部"], correct: 1, hint: "提示：吩咐叮嚀用『口』(囑)；注視重視用『目』(矚)。" },
                { story: "形容文章或事物中雜亂的部分需要被去除：", q: "『去(  )存菁』應填入？", options: ["蕪", "嫵", "撫", "舞"], correct: 0, hint: "提示：蕪 (ㄨˊ) 指雜亂的草木，比喻繁雜的事物。" },
                { story: "金幣的光芒在黑夜中顯得非常剔透：", q: "『晶(  )剔透』正確的寫法是？", options: ["螢", "營", "縈", "瑩"], correct: 3, hint: "提示：瑩 (ㄧㄥˊ) 指玉石光潔的樣子，所以上方是兩顆玉。" },
                { story: "形容太陽快要下山時的暮色：", q: "『暮春』與『朝思暮想』中的『暮』代表？", options: ["招集", "傍晚/太陽下山", "遮蔽", "心動"], correct: 1, hint: "提示：暮 (ㄇㄨˋ) 下方有『日』，代表跟太陽的時間點有關。" },
                { story: "形容一個人永遠無法滿足自己的慾望：", q: "『貪得無(  )』應填入？", options: ["厭", "魘", "饜", "靨"], correct: 2, hint: "提示：饜 (ㄧㄢˋ) 跟食物飽足有關，下方有『食』。" },
                { story: "在深山的峽谷中，聲音不斷迴旋：", q: "『魂牽夢(  )』的正確用字是？", options: ["螢", "瑩", "營", "縈"], correct: 3, hint: "提示：縈 (ㄧㄥˊ) 下方是『糸』(線)，代表纏繞、旋繞。" },
                { story: "大法師忽然想起一個被遺忘的咒語：", q: "『(  )然回首』的讀音與意義為？", options: ["ㄇㄛˋ，忽然", "ㄇㄨˋ，傍晚", "ㄇㄛˊ，模擬", "ㄇㄨˋ，羨慕"], correct: 0, hint: "提示：驀 (ㄇㄛˋ) 上方有『馬』，原指馬跳躍，引申為忽然。" }
            ];

            const filteredData = magicData.filter(d => {
                const matchesSearch = d.char.includes(searchTerm) || d.meaning.includes(searchTerm) || d.example.includes(searchTerm);
                const matchesGroup = selectedGroup === 'all' || d.groupId === selectedGroup;
                return matchesSearch && matchesGroup;
            });

            const handleSelectOption = (optionIdx) => {
                setUserAnswers(prev => ({ ...prev, [quizIndex]: optionIdx }));
                if (quizIndex < quizData.length - 1) {
                    setTimeout(() => setQuizIndex(quizIndex + 1), 500);
                }
            };

            const calculateResults = () => {
                let finalScore = 0;
                const finalWrongs = [];
                quizData.forEach((q, idx) => {
                    if (userAnswers[idx] === q.correct) {
                        finalScore += 10;
                    } else {
                        finalWrongs.push({
                            id: idx + 1,
                            question: q.q,
                            yourAnswer: userAnswers[idx] !== undefined ? q.options[userAnswers[idx]] : "未冥想",
                            correctAnswer: q.options[q.correct],
                            hint: q.hint
                        });
                    }
                });
                setScore(finalScore);
                setWrongAnswers(finalWrongs);
                setShowResult(true);
            };

            const resetQuiz = () => {
                setQuizIndex(0);
                setShowResult(false);
                setScore(0);
                setUserAnswers({});
                setWrongAnswers([]);
            };

            return (
                <div className="min-h-screen">
                    <div className="print-only p-10 text-black bg-white">
                        <div className="text-center mb-10 border-b-2 border-black pb-4">
                            <h1 className="text-3xl font-bold mb-2">金名魔法學院 - 幻影移形術錯題本</h1>
                            <div className="flex justify-between items-center text-lg mt-4 px-10">
                                <p><strong>法師姓名：</strong> {studentName || '見習法師'}</p>
                                <p><strong>修煉得分：</strong> {score} 分</p>
                                <p><strong>列印日期：</strong> {new Date().toLocaleDateString()}</p>
                            </div>
                        </div>
                        <h2 className="text-xl font-bold mb-6">【 錯題修行清單 】</h2>
                        {wrongAnswers.map((item, i) => (
                            <div key={i} className="border border-gray-300 p-5 mb-5 rounded-lg">
                                <p className="font-bold text-lg mb-2">第 {item.id} 題：{item.question}</p>
                                <div className="grid grid-cols-2 gap-4 mb-2">
                                    <p>✘ 你的選擇：<span className="line-through">{item.yourAnswer}</span></p>
                                    <p>✔ 正確咒語：<strong>{item.correctAnswer}</strong></p>
                                </div>
                                <p className="text-sm border-t pt-2 mt-2 italic"><strong>奧義提示：</strong>{item.hint}</p>
                            </div>
                        ))}
                    </div>

                    <div className="no-print">
                        <header className="bg-gradient-to-b from-[#1e1b4b] to-[#0f172a] border-b border-[#d4af37]/30 py-10 px-4 text-center relative">
                            <div className="inline-flex items-center gap-3 px-6 py-2 bg-[#d4af37]/10 rounded-full border border-[#d4af37]/50 mb-4">
                                <Icon name="wand-2" className="w-5 h-5 text-[#d4af37]" />
                                <span className="text-[#d4af37] font-bold tracking-widest text-sm uppercase">金名魔法學院特訓班 - 第二章</span>
                            </div>
                            <h1 className="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#d4af37] via-[#fef3c7] to-[#d4af37] drop-shadow-2xl">
                                幻影移形術：形近字位移辨正
                            </h1>
                        </header>

                        <main className="max-w-6xl mx-auto px-4 py-8 pb-40">
                            <div className="flex flex-wrap justify-center gap-3 mb-10">
                                {[
                                    { id: 'library', label: '魔法圖書館', icon: 'book' },
                                    { id: 'strategy', label: '咒語結構解析', icon: 'zap' },
                                    { id: 'quiz', label: '100分試煉場', icon: 'skull' },
                                ].map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`flex items-center gap-2 px-6 py-3 rounded-2xl font-bold transition-all ${
                                            activeTab === tab.id 
                                            ? 'bg-[#d4af37] text-indigo-950 scale-105 shadow-lg' 
                                            : 'bg-indigo-900/30 text-slate-300 hover:bg-indigo-900/50 border border-indigo-800'
                                        }`}
                                    >
                                        <Icon name={tab.icon} />
                                        {tab.label}
                                    </button>
                                ))}
                            </div>

                            {activeTab === 'library' && (
                                <div className="space-y-6">
                                    <div className="flex flex-wrap gap-2 justify-center pb-6 border-b border-indigo-900/50">
                                        {groups.map(g => (
                                            <button
                                                key={g.id}
                                                onClick={() => setSelectedGroup(g.id)}
                                                className={`px-4 py-2 rounded-xl text-sm font-bold border transition-all ${
                                                    selectedGroup === g.id 
                                                    ? 'bg-indigo-600 border-indigo-400 text-white shadow-[0_0_15px_rgba(79,70,229,0.4)]' 
                                                    : 'bg-indigo-950/50 border-indigo-800 text-slate-400 hover:border-[#d4af37]/50'
                                                }`}
                                            >
                                                {g.label}
                                            </button>
                                        ))}
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 mt-8">
                                        {filteredData.map((item, idx) => (
                                            <div key={idx} className="bg-indigo-950/40 border border-indigo-800/50 rounded-2xl p-5 hover:border-[#d4af37]/50 group transition-all backdrop-blur-sm">
                                                <div className="flex justify-between items-center mb-3">
                                                    <span className="text-4xl font-black text-[#d4af37] drop-shadow-lg">{item.char}</span>
                                                    <span className="bg-indigo-900 px-3 py-1 rounded-lg text-indigo-300 font-bold text-sm">{item.pinyin}</span>
                                                </div>
                                                <div className="space-y-3">
                                                    <p className="text-slate-300 text-sm font-medium leading-relaxed border-l-2 border-[#d4af37]/50 pl-3">
                                                        {item.meaning}
                                                    </p>
                                                    <div className="bg-[#d4af37]/5 p-3 rounded-xl border border-[#d4af37]/20">
                                                        <span className="text-[10px] text-[#d4af37] font-black uppercase block mb-1">奧義實例</span>
                                                        <p className="text-[#fef3c7] font-bold text-sm">{item.example}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'strategy' && (
                                <div className="max-w-4xl mx-auto space-y-8">
                                    <div className="bg-[#fef3c7] text-indigo-950 p-8 rounded-[40px] shadow-2xl border-4 border-[#d4af37]/30">
                                        <h3 className="text-2xl font-black mb-8 flex items-center gap-2">
                                            <Icon name="star" className="text-[#d4af37] fill-[#d4af37]" /> 幻化奧義：部首解析
                                        </h3>
                                        <div className="grid md:grid-cols-2 gap-6">
                                            <div className="space-y-4">
                                                <div className="p-4 bg-white/60 rounded-2xl border border-indigo-200">
                                                    <p className="font-bold text-indigo-900 mb-1">【幕】 系列核心：</p>
                                                    <ul className="text-sm space-y-2 text-indigo-800">
                                                        <li>• <span className="font-bold underline">土</span> {'→'} 墓 (埋葬之土)</li>
                                                        <li>• <span className="font-bold underline">日</span> {'→'} 暮 (落日黃昏)</li>
                                                        <li>• <span className="font-bold underline">心</span> {'→'} 慕 (心中愛慕)</li>
                                                        <li>• <span className="font-bold underline">巾</span> {'→'} 幕 (布帳幕簾)</li>
                                                        <li>• <span className="font-bold underline">力</span> {'→'} 募 (出力募集)</li>
                                                        <li>• <span className="font-bold underline">馬</span> {'→'} 驀 (快馬突現)</li>
                                                    </ul>
                                                </div>
                                            </div>
                                            <div className="space-y-4">
                                                <div className="p-4 bg-white/60 rounded-2xl border border-indigo-200">
                                                    <p className="font-bold text-indigo-900 mb-1">【厭】 系列核心：</p>
                                                    <ul className="text-sm space-y-2 text-indigo-800">
                                                        <li>• <span className="font-bold underline">食</span> {'→'} 饜 (吃飽滿足)</li>
                                                        <li>• <span className="font-bold underline">鬼</span> {'→'} 魘 (夢中見鬼)</li>
                                                        <li>• <span className="font-bold underline">面</span> {'→'} 靨 (臉面酒窩)</li>
                                                    </ul>
                                                </div>
                                                <div className="p-4 bg-indigo-900 text-white rounded-2xl border border-indigo-700">
                                                    <p className="font-bold text-[#d4af37] mb-1">【濘/獰/擰】 辨析：</p>
                                                    <ul className="text-sm space-y-1 opacity-90">
                                                        <li>• 手部 {'→'} 擰 (用力旋轉)</li>
                                                        <li>• 犬部 {'→'} 獰 (面目凶惡)</li>
                                                        <li>• 水部 {'→'} 濘 (泥水濕滑)</li>
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'quiz' && (
                                <div className="max-w-4xl mx-auto">
                                    {!showResult ? (
                                        <div className="bg-indigo-950/60 border border-[#d4af37]/40 p-8 rounded-[40px] backdrop-blur-xl shadow-2xl">
                                            <div className="flex flex-wrap justify-between gap-3 mb-10 pb-4 border-b border-indigo-900/50">
                                                {quizData.map((_, i) => (
                                                    <button 
                                                        key={i} 
                                                        onClick={() => setQuizIndex(i)}
                                                        className={`w-10 h-10 flex items-center justify-center rounded-xl font-black text-xs transition-all ${
                                                            i === quizIndex 
                                                                ? 'bg-[#d4af37] text-indigo-950 shadow-[0_0_15px_rgba(212,175,55,0.4)]' 
                                                                : userAnswers[i] !== undefined 
                                                                    ? 'bg-indigo-600 text-white' 
                                                                    : 'bg-indigo-900/40 text-indigo-700 border border-indigo-800'
                                                        }`}
                                                    >
                                                        {i + 1}
                                                    </button>
                                                ))}
                                            </div>

                                            <div className="bg-indigo-900/30 p-6 rounded-3xl border border-indigo-800 mb-8 italic text-indigo-200 text-lg leading-relaxed">
                                                「{quizData[quizIndex].story}」
                                            </div>

                                            <p className="text-xl font-bold mb-6 text-white">{quizData[quizIndex].q}</p>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {quizData[quizIndex].options.map((opt, idx) => {
                                                    const isSelected = userAnswers[quizIndex] === idx;
                                                    return (
                                                        <button
                                                            key={idx}
                                                            onClick={() => handleSelectOption(idx)}
                                                            className={`w-full text-left p-6 rounded-3xl font-bold border-2 transition-all flex items-center justify-between ${
                                                                isSelected 
                                                                    ? 'bg-[#d4af37]/20 border-[#d4af37] text-[#d4af37]' 
                                                                    : 'bg-indigo-950/40 border-indigo-800 hover:border-indigo-600 text-slate-400'
                                                            }`}
                                                        >
                                                            <span>{String.fromCharCode(65 + idx)}. {opt}</span>
                                                            {isSelected && <Icon name="check-circle" />}
                                                        </button>
                                                    );
                                                })}
                                            </div>

                                            <div className="mt-12 flex justify-between items-center pt-8 border-t border-indigo-900/50">
                                                <button disabled={quizIndex === 0} onClick={() => setQuizIndex(quizIndex - 1)} className="text-indigo-400 font-bold disabled:opacity-20">← 上一關</button>
                                                {Object.keys(userAnswers).length === quizData.length && (
                                                    <button onClick={calculateResults} className="bg-[#d4af37] text-indigo-950 px-10 py-4 rounded-2xl font-black shadow-xl animate-pulse">提交試煉</button>
                                                )}
                                                <button disabled={quizIndex === quizData.length - 1} onClick={() => setQuizIndex(quizIndex + 1)} className="text-indigo-400 font-bold disabled:opacity-20">下一關 →</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-8">
                                            <div className="text-center bg-indigo-900/40 p-12 rounded-[50px] border border-[#d4af37]/30 shadow-2xl">
                                                <div className="text-8xl font-black text-white mb-2">{score} <span className="text-2xl text-[#d4af37]">分</span></div>
                                                <div className="text-3xl font-black text-[#fef3c7] mb-8">{score === 100 ? "大魔導師：幻影無蹤！" : "試煉結束，尚須修行"}</div>
                                                
                                                <input 
                                                    type="text" 
                                                    value={studentName}
                                                    onChange={(e) => setStudentName(e.target.value)}
                                                    placeholder="輸入姓名以列印錯題本..."
                                                    className="bg-indigo-950 border border-indigo-800 rounded-xl py-3 px-6 mb-6 text-white outline-none focus:border-[#d4af37]"
                                                />

                                                <div className="flex gap-4 justify-center">
                                                    <button onClick={() => window.print()} className="bg-white text-indigo-950 px-8 py-3 rounded-xl font-bold flex items-center gap-2">
                                                        <Icon name="printer" /> 列印修行本
                                                    </button>
                                                    <button onClick={resetQuiz} className="bg-indigo-800 text-white px-8 py-3 rounded-xl font-bold">
                                                        重新修煉
                                                    </button>
                                                </div>
                                            </div>

                                            {wrongAnswers.length > 0 && (
                                                <div className="bg-indigo-950/40 border border-indigo-800 rounded-[40px] p-10">
                                                    <h3 className="text-2xl font-black text-[#d4af37] mb-8 flex items-center gap-3">
                                                        <Icon name="layout-grid" /> 試煉錯題分析
                                                    </h3>
                                                    <div className="space-y-6">
                                                        {wrongAnswers.map((item, i) => (
                                                            <div key={i} className="bg-indigo-900/20 p-6 rounded-3xl border border-indigo-800">
                                                                <p className="font-black text-[#fef3c7] mb-4 text-lg">第 {item.id} 題：{item.question}</p>
                                                                <div className="grid grid-cols-2 gap-4 mb-4">
                                                                    <div className="bg-rose-500/10 p-3 rounded-xl text-rose-300 text-sm">你的選擇：{item.yourAnswer}</div>
                                                                    <div className="bg-emerald-500/10 p-3 rounded-xl text-emerald-300 text-sm font-bold">正確咒語：{item.correctAnswer}</div>
                                                                </div>
                                                                <p className="text-xs text-[#d4af37]/80 bg-[#d4af37]/5 p-3 rounded-lg border border-[#d4af37]/20 italic">奧義：{item.hint}</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}
                        </main>

                        <footer className="fixed bottom-0 left-0 right-0 bg-indigo-950/90 backdrop-blur-md border-t border-[#d4af37]/20 p-5 z-50">
                            <div className="max-w-5xl mx-auto flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <div className="p-2 bg-[#d4af37]/20 rounded-lg">
                                        <Icon name="graduation-cap" className="text-[#d4af37]" />
                                    </div>
                                    <p className="text-[#d4af37] font-black text-sm uppercase tracking-widest hidden md:block">金名魔法學院 ‧ 國語特訓</p>
                                </div>
                                <div className="flex items-center gap-6">
                                    <div className="text-right">
                                        <p className="text-[10px] font-black text-slate-500">當前修行能量</p>
                                        <p className="text-2xl font-black text-[#d4af37] leading-none">{score}</p>
                                    </div>
                                    <button className="bg-indigo-800 hover:bg-[#d4af37] hover:text-indigo-950 text-[#d4af37] px-6 py-2 rounded-xl text-xs font-black transition-all border border-[#d4af37]/30">
                                        邁向最終試煉
                                    </button>
                                </div>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
