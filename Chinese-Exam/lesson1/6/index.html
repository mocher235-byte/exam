<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金名魔法學院 - 字形幻化術 (三階進階)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX Parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0f172a;
        }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; color: black !important; }
        }
        .print-only { display: none; }
        
        .magic-glow {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }
        .magic-card:hover {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
            transform: translateY(-4px);
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .magic-text-shadow {
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
        }
    </style>
</head>
<body class="text-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            const [svg, setSvg] = React.useState('');
            React.useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    const iconSvg = window.lucide.icons[name].toSvg({
                        class: className,
                        ...props
                    });
                    setSvg(iconSvg);
                }
            }, [name, className]);
            return <span dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('library');
            const [quizIndex, setQuizIndex] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [userAnswers, setUserAnswers] = useState({});
            const [studentName, setStudentName] = useState('');
            const [score, setScore] = useState(0);

            // 針對圖片內容整理的教學數據
            const libraryData = [
                { 
                    title: "卷、券辨析", 
                    items: [
                        { char: "券", usage: "優惠(券)", desc: "指具有價值或證明的文件。", zhuyin: "ㄑㄩㄢˋ" },
                        { char: "卷", usage: "考(卷)", desc: "指可捲起來的書畫或考試用紙。", zhuyin: "ㄐㄩㄢˋ" }
                    ]
                },
                { 
                    title: "濘、擰辨析", 
                    items: [
                        { char: "濘", usage: "泥(濘)", desc: "爛泥淤積、不好走。", zhuyin: "ㄋㄧㄥˋ" },
                        { char: "擰", usage: "(擰)乾", desc: "扭轉、用力擠壓。", zhuyin: "ㄋㄧㄥˊ" }
                    ]
                },
                { 
                    title: "鑠、爍、礫辨析", 
                    items: [
                        { char: "鑠", usage: "眾口(鑠)金", desc: "消熔金屬。比喻毀謗多足以致人於死。", zhuyin: "ㄕㄨㄛˋ" },
                        { char: "爍", usage: "閃(爍)", desc: "光亮動搖的樣子。", zhuyin: "ㄕㄨㄛˋ" },
                        { char: "礫", usage: "瓦(礫)", desc: "碎石、碎磚瓦。", zhuyin: "ㄌㄧˋ" }
                    ]
                },
                { 
                    title: "撼、憾辨析", 
                    items: [
                        { char: "撼", usage: "震(撼)", desc: "搖動、搖撼。", zhuyin: "ㄏㄢˋ" },
                        { char: "憾", usage: "遺(憾)", desc: "心裡感到可惜、不滿。", zhuyin: "ㄏㄢˋ" }
                    ]
                }
            ];

            // 根據圖片實作的 10 題測驗內容
            const quizData = [
                { type: "choice", q: "「使用優惠(  )購物或消費，往往比較便宜。」(  )內應填入：", options: ["捲", "堪", "卷", "券"], correct: 3, hint: "「券」是指有價證券或票據。" },
                { type: "choice", q: "「大雨過後，山路泥(  )，開車要特別小心。」(  )內應填入：", options: ["寧", "濘", "擰", "擗"], correct: 1, hint: "「濘」與水有關，表示泥漿多。" },
                { type: "choice", q: "「他因為不堪謠言的困擾而請辭，真可說是眾口(  )金，人言可畏啊！」", options: ["鑠", "樂", "礫", "爍"], correct: 0, hint: "眾口鑠金：形容輿論力量大，能熔化金屬，引申為毀謗威力大。" },
                { type: "choice", q: "「職棒球員涉嫌打假球一案，令社會各界相當震(  )！」", options: ["撼", "憾", "焊", "悍"], correct: 0, hint: "「震撼」表示心靈或環境受到強烈衝擊搖動。" },
                { type: "choice", q: "「(  )春時節，天氣既涼爽又宜人，好不舒服！」", options: ["暮", "慕", "幕", "募"], correct: 0, hint: "「暮春」指農曆三月，即春季的末尾。" },
                { type: "choice", q: "請依序選出正確字形：西裝革(  )、(  )試不爽、蓽路藍(  )", options: ["履，屢，縷", "屢，縷，履", "縷，履，屢", "履，縷，屢"], correct: 0, hint: "革履(鞋)、屢次(次數)、藍縷(破爛衣服)。" },
                { type: "choice", q: "請依序選出正確字形：推波助(  )、口無遮(  )、天真(  )漫", options: ["欄，攔，爛", "瀾，攔，爛", "瀾，攔，蘭", "欄，瀾，蘭"], correct: 1, hint: "波瀾(大波浪)、遮攔(擋住)、爛漫(光彩分明)。" },
                { type: "choice", q: "下列哪一個選項用字「正確」？", options: ["他優異的表現眾所矚目", "考試作幣是不對的行為", "選手都磨拳擦掌準備比賽", "做人不應該嬌傲自大"], correct: 0, hint: "作「幣」應為「弊」；「磨」拳應為「摩」；「嬌」傲應為「驕」。" },
                { type: "choice", q: "下列哪一個選項用字「錯誤」？", options: ["我們不應該妨害他人的自由", "颱風來臨前要做好防災工作", "週日全家人去拜訪親戚", "我們不應該購買彷冒品"], correct: 3, hint: "「彷」冒品應改為「仿」冒品。" },
                { type: "choice", q: "下列各段文字，何者用字完全「正確」？", options: ["她那雙深邃的眼眸很會放電", "獨居老人的晚景使人感嘆不已", "啦啦隊的表演，洋溢著青春氣息", "員工曾經醞釀春節集體罷工"], correct: 2, hint: "此題旨在辨析常用詞彙。 (註：選項均接近正確，但需注意微細字形如「洋溢」非「洋益」)。" }
            ];

            const handleAnswer = (idx) => {
                setUserAnswers({ ...userAnswers, [quizIndex]: idx });
                if (quizIndex < quizData.length - 1) {
                    setTimeout(() => setQuizIndex(quizIndex + 1), 300);
                }
            };

            const finishQuiz = () => {
                let correctCount = 0;
                quizData.forEach((q, i) => {
                    if (userAnswers[i] === q.correct) correctCount++;
                });
                setScore(Math.round((correctCount / quizData.length) * 100));
                setShowResult(true);
            };

            const reset = () => {
                setQuizIndex(0);
                setUserAnswers({});
                setShowResult(false);
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* 列印視圖 */}
                    <div className="print-only p-8 text-black">
                        <h1 className="text-2xl font-bold text-center border-b-2 pb-4 mb-4">金名魔法學院 - 字形幻化術考核單</h1>
                        <p className="mb-2">學員姓名：{studentName || "未署名"}</p>
                        <p className="mb-4">最終法力值：<span className="text-xl font-bold">{score}</span> / 100</p>
                        <hr className="my-4" />
                        {quizData.map((q, i) => (
                            <div key={i} className="mb-4 text-sm">
                                <p className="font-bold">{i+1}. {q.q}</p>
                                <p>選擇：{q.options[userAnswers[i]] || "未作答"} 
                                    {userAnswers[i] === q.correct ? " ✅" : ` ❌ (正確：${q.options[q.correct]})`}
                                </p>
                                <p className="italic text-gray-600">魔法提示：{q.hint}</p>
                            </div>
                        ))}
                    </div>

                    <div className="no-print">
                        {/* Header */}
                        <header className="bg-gradient-to-b from-[#1e1b4b] to-[#0f172a] border-b border-[#d4af37]/30 py-12 px-4 text-center">
                            <div className="inline-flex items-center gap-3 px-6 py-2 bg-[#d4af37]/10 rounded-full border border-[#d4af37]/50 mb-6">
                                <Icon name="wand-2" className="text-[#d4af37]" />
                                <span className="text-[#d4af37] font-bold tracking-widest text-sm uppercase">Jinming Advanced Training</span>
                            </div>
                            <h1 className="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#d4af37] via-[#fef3c7] to-[#d4af37] mb-4 magic-text-shadow">
                                字形幻化術：魔法奧義辨正
                            </h1>
                            <p className="text-indigo-300 font-medium">看破字形的偽裝，成就大魔導師之路</p>
                        </header>

                        <main className="max-w-5xl mx-auto px-4 py-10">
                            {/* Tabs */}
                            <div className="flex justify-center gap-4 mb-10">
                                <button 
                                    onClick={() => setActiveTab('library')}
                                    className={`px-6 py-3 rounded-xl font-bold transition-all ${activeTab === 'library' ? 'bg-[#d4af37] text-indigo-950 shadow-lg' : 'bg-indigo-900/30 text-indigo-300 border border-indigo-800'}`}
                                >
                                    基礎咒語本
                                </button>
                                <button 
                                    onClick={() => setActiveTab('quiz')}
                                    className={`px-6 py-3 rounded-xl font-bold transition-all ${activeTab === 'quiz' ? 'bg-[#d4af37] text-indigo-950 shadow-[0_0_15px_rgba(212,175,55,0.4)]' : 'bg-indigo-900/30 text-indigo-300 border border-indigo-800'}`}
                                >
                                    100分試煉場
                                </button>
                            </div>

                            {activeTab === 'library' ? (
                                <div className="grid gap-8 animate-in fade-in duration-500">
                                    {libraryData.map((group, idx) => (
                                        <div key={idx} className="bg-indigo-950/40 border border-indigo-800 rounded-[32px] overflow-hidden">
                                            <div className="bg-indigo-900/50 px-8 py-4 border-b border-indigo-800 flex items-center justify-between">
                                                <h2 className="text-[#d4af37] text-xl font-black">{group.title}</h2>
                                                <Icon name="book-open" className="text-[#d4af37]" />
                                            </div>
                                            <div className="p-8 grid md:grid-cols-2 lg:grid-cols-2 gap-6">
                                                {group.items.map((item, i) => (
                                                    <div key={i} className="magic-card bg-indigo-900/20 p-6 rounded-2xl border border-white/5 group transition-all">
                                                        <div className="flex justify-between items-start mb-2">
                                                            <div className="text-5xl font-black text-white group-hover:text-[#d4af37] transition-colors">{item.char}</div>
                                                            <div className="bg-indigo-950 px-3 py-1 rounded text-xs font-bold text-[#d4af37] border border-[#d4af37]/20">
                                                                {item.zhuyin}
                                                            </div>
                                                        </div>
                                                        <div className="text-[#fef3c7] font-bold text-lg mb-3">{item.usage}</div>
                                                        <div className="text-slate-400 text-sm leading-relaxed border-t border-white/5 pt-3">
                                                            {item.desc}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                    <div className="bg-gradient-to-r from-amber-200 to-yellow-50 text-indigo-950 p-8 rounded-[32px] mt-4 shadow-xl border-l-8 border-amber-500">
                                        <h3 className="text-xl font-black mb-4 flex items-center gap-2"><Icon name="flame" /> 進階修煉重點</h3>
                                        <div className="grid md:grid-cols-2 gap-6">
                                            <div>
                                                <p className="font-bold text-indigo-900 mb-2">辨別「同音字」：</p>
                                                <p className="text-sm opacity-80">許多字讀音相同，但「部首」暗示了其意義，如「濘」與水有關，「擰」與手部動作有關。</p>
                                            </div>
                                            <div>
                                                <p className="font-bold text-indigo-900 mb-2">掌握「成語固定用字」：</p>
                                                <p className="text-sm opacity-80">「眾口鑠金」、「蓽路藍縷」等固定詞組，字形不可隨意替換。</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="max-w-3xl mx-auto animate-in slide-in-from-bottom duration-500">
                                    {!showResult ? (
                                        <div className="bg-indigo-950/60 border border-[#d4af37]/30 p-8 md:p-12 rounded-[48px] backdrop-blur-xl shadow-2xl relative overflow-hidden">
                                            {/* Progress bar */}
                                            <div className="absolute top-0 left-0 h-1 bg-[#d4af37] transition-all duration-300" style={{ width: `${((quizIndex + 1) / quizData.length) * 100}%` }}></div>
                                            
                                            <div className="flex justify-between items-center mb-10">
                                                <span className="text-[#d4af37] font-black tracking-widest text-xs">修煉進度 {quizIndex + 1} / {quizData.length}</span>
                                                <div className="flex gap-1 overflow-x-auto scrollbar-hide">
                                                    {quizData.map((_, i) => (
                                                        <div key={i} className={`w-2 h-2 rounded-full ${i === quizIndex ? 'bg-[#d4af37]' : userAnswers[i] !== undefined ? 'bg-indigo-400' : 'bg-indigo-800'}`}></div>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="mb-10 text-center">
                                                <h3 className="text-indigo-300 text-sm font-bold mb-4 uppercase tracking-[0.2em]">Level {quizIndex + 1}</h3>
                                                <p className="text-2xl md:text-3xl font-black text-white leading-relaxed">
                                                    {quizData[quizIndex].q}
                                                </p>
                                            </div>

                                            <div className="grid gap-4">
                                                {quizData[quizIndex].options.map((opt, idx) => (
                                                    <button
                                                        key={idx}
                                                        onClick={() => handleAnswer(idx)}
                                                        className={`p-5 rounded-3xl font-black text-left border-2 transition-all flex items-center justify-between group ${
                                                            userAnswers[quizIndex] === idx 
                                                            ? 'bg-[#d4af37]/20 border-[#d4af37] text-[#d4af37]' 
                                                            : 'bg-indigo-900/40 border-indigo-800 hover:border-[#d4af37]/50 text-indigo-200'
                                                        }`}
                                                    >
                                                        <span className="flex items-center gap-4">
                                                            <div className="w-8 h-8 rounded-lg bg-indigo-950 flex items-center justify-center text-xs text-[#d4af37] font-bold">
                                                                {idx + 1}
                                                            </div>
                                                            <span className="text-xl">{opt}</span>
                                                        </span>
                                                        {userAnswers[quizIndex] === idx && <Icon name="check" className="text-[#d4af37]" />}
                                                    </button>
                                                ))}
                                            </div>

                                            <div className="flex justify-between mt-12 pt-8 border-t border-indigo-800">
                                                <button 
                                                    disabled={quizIndex === 0}
                                                    onClick={() => setQuizIndex(quizIndex - 1)}
                                                    className="text-indigo-400 font-bold disabled:opacity-20 flex items-center gap-2"
                                                >
                                                    <Icon name="chevron-left" /> 撤回
                                                </button>
                                                {Object.keys(userAnswers).length === quizData.length ? (
                                                    <button 
                                                        onClick={finishQuiz}
                                                        className="bg-[#d4af37] text-indigo-950 px-10 py-4 rounded-2xl font-black shadow-lg hover:scale-105 transition-all"
                                                    >
                                                        交付成果
                                                    </button>
                                                ) : (
                                                    <button 
                                                        disabled={quizIndex === quizData.length - 1}
                                                        onClick={() => setQuizIndex(quizIndex + 1)}
                                                        className="text-indigo-400 font-bold disabled:opacity-20 flex items-center gap-2"
                                                    >
                                                        下一關 <Icon name="chevron-right" />
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-8 pb-10">
                                            <div className="text-center bg-indigo-950 border border-[#d4af37]/30 p-12 rounded-[56px] shadow-2xl relative overflow-hidden">
                                                <div className="relative z-10">
                                                    <Icon name="medal" className="w-20 h-20 text-[#d4af37] mx-auto mb-4" />
                                                    <div className="text-8xl font-black text-white mb-2">{score} <span className="text-2xl text-[#d4af37]">Power</span></div>
                                                    <div className="text-2xl font-black text-[#fef3c7] mb-8">
                                                        {score >= 90 ? "金剛導師：識破所有幻象" : score >= 70 ? "高級法師：仍需淬煉字魂" : "見習生：速回圖書館修行"}
                                                    </div>
                                                    
                                                    <div className="max-w-xs mx-auto mb-8">
                                                        <input 
                                                            type="text" 
                                                            value={studentName}
                                                            onChange={(e) => setStudentName(e.target.value)}
                                                            placeholder="輸入法師尊號以領取證書..."
                                                            className="w-full bg-indigo-900/50 border border-indigo-700 rounded-2xl py-4 px-6 focus:border-[#d4af37] outline-none text-white text-center font-bold"
                                                        />
                                                    </div>

                                                    <div className="flex flex-wrap gap-4 justify-center">
                                                        <button onClick={() => window.print()} className="bg-white text-indigo-950 px-8 py-4 rounded-2xl font-black flex items-center gap-2 hover:bg-[#d4af37] transition-all">
                                                            <Icon name="download" /> 列印修行紀錄
                                                        </button>
                                                        <button onClick={reset} className="bg-indigo-800 text-white px-8 py-4 rounded-2xl font-black flex items-center gap-2 border border-indigo-600 hover:bg-indigo-700 transition-all">
                                                            <Icon name="refresh-cw" /> 重頭修煉
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* 錯題檢閱 */}
                                            <div className="bg-indigo-950/40 border border-indigo-800 rounded-[40px] p-8">
                                                <h4 className="text-[#d4af37] font-black text-xl mb-6 flex items-center gap-2">
                                                    <Icon name="search" /> 弱點分析
                                                </h4>
                                                <div className="space-y-4">
                                                    {quizData.map((q, i) => {
                                                        const isCorrect = userAnswers[i] === q.correct;
                                                        if (isCorrect) return null;
                                                        return (
                                                            <div key={i} className="bg-indigo-900/30 p-6 rounded-2xl border border-rose-500/20 group hover:border-rose-500/50 transition-all">
                                                                <p className="text-white font-bold mb-4">{i+1}. {q.q}</p>
                                                                <div className="grid grid-cols-2 gap-4 text-sm mb-4">
                                                                    <div className="bg-rose-500/10 p-3 rounded-xl text-rose-300 flex items-center gap-2">
                                                                        <Icon name="x-circle" className="w-4 h-4" /> 您的回答：{q.options[userAnswers[i]] || "未作答"}
                                                                    </div>
                                                                    <div className="bg-emerald-500/10 p-3 rounded-xl text-emerald-300 flex items-center gap-2">
                                                                        <Icon name="check-circle" className="w-4 h-4" /> 正確解答：{q.options[q.correct]}
                                                                    </div>
                                                                </div>
                                                                <div className="text-indigo-200 text-sm italic bg-indigo-950 p-4 rounded-xl border border-indigo-700">
                                                                    <span className="font-bold text-[#d4af37] mr-2">✦ 魔法奧義：</span>{q.hint}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                    {Object.values(userAnswers).filter((ans, i) => ans === quizData[i].correct).length === quizData.length && (
                                                        <div className="text-center py-10">
                                                            <Icon name="sparkles" className="w-12 h-12 text-[#d4af37] mx-auto mb-4" />
                                                            <p className="text-[#d4af37] font-black text-xl">無瑕的法力！所有幻象都已被識破。</p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </main>

                        {/* Footer */}
                        <footer className="fixed bottom-0 left-0 right-0 bg-indigo-950/90 backdrop-blur-xl border-t border-[#d4af37]/20 p-4 z-50">
                            <div className="max-w-5xl mx-auto flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-indigo-900 flex items-center justify-center border border-[#d4af37]/30">
                                        <Icon name="shield-check" className="text-[#d4af37] w-6 h-6" />
                                    </div>
                                    <span className="hidden sm:block text-[#d4af37] font-black text-sm">第 1 單元 ‧ 字形幻化術 (進階考核)</span>
                                </div>
                                <div className="flex items-center gap-6">
                                    <div className="text-right">
                                        <p className="text-[10px] font-bold text-indigo-400 uppercase">Challenge Status</p>
                                        <p className="text-xl font-black text-white">{Object.keys(userAnswers).length} / {quizData.length}</p>
                                    </div>
                                    <button 
                                        className="bg-[#d4af37] px-5 py-2 rounded-xl text-indigo-950 font-black text-sm hover:scale-105 transition-all"
                                        onClick={() => { setActiveTab('quiz'); reset(); }}
                                    >
                                        重啟挑戰
                                    </button>
                                </div>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
