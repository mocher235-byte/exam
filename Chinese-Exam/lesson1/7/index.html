<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金名魔法學院 - 字形幻化術 (大師試煉)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX Parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0f172a;
        }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; color: black !important; }
        }
        .print-only { display: none; }
        
        .magic-glow {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }
        .magic-card:hover {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
            transform: translateY(-4px);
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .magic-text-shadow {
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
        }
        .correct-bg { background-color: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.5); }
        .wrong-bg { background-color: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body class="text-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            const [svg, setSvg] = React.useState('');
            React.useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    const iconSvg = window.lucide.icons[name].toSvg({
                        class: className,
                        ...props
                    });
                    setSvg(iconSvg);
                }
            }, [name, className]);
            return <span dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('library');
            const [quizIndex, setQuizIndex] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [userAnswers, setUserAnswers] = useState({});
            const [studentName, setStudentName] = useState('');
            const [score, setScore] = useState(0);

            // 針對圖片內容整理的教學數據
            const libraryData = [
                { 
                    title: "券、卷、眷辨析", 
                    items: [
                        { char: "券", usage: "彩券、優惠券", desc: "指票據或具有價值的證明。", zhuyin: "ㄑㄩㄢˋ" },
                        { char: "卷", usage: "試卷、考卷", desc: "指文書、考題或可捲起的書畫。", zhuyin: "ㄐㄩㄢˋ" },
                        { char: "眷", usage: "家眷、攜眷", desc: "指家屬、親屬。", zhuyin: "ㄐㄩㄢˋ" }
                    ]
                },
                { 
                    title: "暮、幕、募、墓辨析", 
                    items: [
                        { char: "暮", usage: "歲暮、暮色", desc: "指傍晚、晚期或末尾。", zhuyin: "ㄇㄨˋ" },
                        { char: "幕", usage: "幕後、開幕", desc: "指掛在後方的簾幕或事情的背後。", zhuyin: "ㄇㄨˋ" },
                        { char: "募", usage: "招募、募集", desc: "指徵求、收集。", zhuyin: "ㄇㄨˋ" },
                        { char: "墓", usage: "掃墓、公墓", desc: "指埋葬死者的地方。", zhuyin: "ㄇㄨˋ" }
                    ]
                },
                { 
                    title: "弊、斃、蔽辨析", 
                    items: [
                        { char: "弊", usage: "弊端、作弊", desc: "指壞事、缺點或欺詐行為。", zhuyin: "ㄅㄧˋ" },
                        { char: "斃", usage: "槍斃、斃命", desc: "指死亡、被殺死。", zhuyin: "ㄅㄧˋ" },
                        { char: "蔽", usage: "遮蔽、掩蔽", desc: "指遮蓋、擋住視線。", zhuyin: "ㄅㄧˋ" }
                    ]
                }
            ];

            // 根據圖片 image_a21c57.jpg 實作的 8 題測驗
            const quizData = [
                { 
                    q: "下列選項「 」中的形似字，何者「不正確」？", 
                    options: ["美輪美「奐」", "「煥」然一新", "身體癱「瘓」", "精神「渙」散"], 
                    correct: 0, 
                    hint: "「美輪美奐」常用於形容房屋高大華美，『奐』不可誤植。註：此題選項在圖片中皆為正確字形，若選不正確，通常考點在『美輪美奐』之奐或『渙』散之渙。" 
                },
                { 
                    q: "下列選項「 」中的形似字，何者「正確」？", 
                    options: ["魂牽夢「營」", "晶「繫」剔透", "「瑩」利事業", "「螢」火蟲"], 
                    correct: 3, 
                    hint: "魂牽夢「縈」；晶「瑩」剔透；「營」利事業。僅有「螢」火蟲正確。" 
                },
                { 
                    q: "「含情□□、人情冷□、□契十足、形同□路」，以上□中依序應填入：", 
                    options: ["默默，莫，漢，脈", "陌陌，漠，莫，脈", "脈脈，漠，默，陌", "漠漠，脈，莫，寞"], 
                    correct: 2, 
                    hint: "含情脈脈(ㄇㄛˋ)、人情冷漠、默契十足、形同陌路。" 
                },
                { 
                    q: "「在天寒歲□之際，籌備已久的餐廳即將開□了。我們開始招□工作人員，並且在□後功臣周董的大力贊助之下，歡天喜地的朝我們的夢想邁進。」以上□中依序應填入：", 
                    options: ["暮，幕，募，幕", "幕，暮，募，墓", "暮，幕，墓，慕", "募，幕，慕，幕"], 
                    correct: 0, 
                    hint: "天寒歲『暮』(末尾)、開『幕』(簾幕)、招『募』(招求)、『幕』後功臣。" 
                },
                { 
                    q: "下列選項「 」中的注音寫成國字後，何者和其他三個「不相同」？", 
                    options: ["營私舞「ㄅㄧˋ」", "利「ㄅㄧˋ」得失", "槍「ㄅㄧˋ」罪犯", "社會「ㄅㄧˋ」端"], 
                    correct: 2, 
                    hint: "(1)(2)(4)皆為「弊」；(3)則為「斃」。" 
                },
                { 
                    q: "（甲）購買樂透彩「ㄑㄩㄢˋ」的熱度（乙）這次國語考「ㄐㄩㄢˋ」的題目（丙）員工旅遊歡迎攜「ㄐㄩㄢˋ」參加。以上注音對應的國字依序為：", 
                    options: ["眷，卷，券", "券，卷，眷", "卷，券，眷", "眷，券，卷"], 
                    correct: 1, 
                    hint: "（甲）彩券；（乙）考卷；（丙）攜眷。" 
                },
                { 
                    q: "下列各句，何者用字「完全正確」？", 
                    options: ["知足才會常樂，切莫貪得無饜", "做任何事，均應貫徹始終，不要半途而廢", "一個人若沒有智慧，又如何明辦是非", "不要怕困難，要適時給自己鼓屬"], 
                    correct: 0, 
                    hint: "(1)正確；(2)半途而廢（圖片中廢字若誤則錯）；(3)明「辨」是非；(4)鼓「勵」。" 
                },
                { 
                    q: "下列文句，何者「錯別字最多」？", 
                    options: ["同學們景然有序的進入禮堂", "他耽溺於漫畫書中，導至成績一落千丈", "看到媽媽愉悅的笑魔，我再也不煩腦了", "公告欄上張貼一張徵求義工的啟示"], 
                    correct: 2, 
                    hint: "(1)『井』然；(2)導『致』；(3)笑『靨』、煩『惱』（共兩處）；(4)啟『事』。" 
                }
            ];

            const handleAnswer = (idx) => {
                setUserAnswers({ ...userAnswers, [quizIndex]: idx });
                if (quizIndex < quizData.length - 1) {
                    setTimeout(() => setQuizIndex(quizIndex + 1), 300);
                }
            };

            const finishQuiz = () => {
                let correctCount = 0;
                quizData.forEach((q, i) => {
                    if (userAnswers[i] === q.correct) correctCount++;
                });
                setScore(Math.round((correctCount / quizData.length) * 100));
                setShowResult(true);
            };

            const reset = () => {
                setQuizIndex(0);
                setUserAnswers({});
                setShowResult(false);
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* 列印視圖 */}
                    <div className="print-only p-8 text-black">
                        <h1 className="text-2xl font-bold text-center border-b-2 pb-4 mb-4">金名魔法學院 - 大師試煉考核單</h1>
                        <div className="flex justify-between mb-4">
                            <p>學員尊號：{studentName || "未署名"}</p>
                            <p>魔法等級：{score >= 90 ? "大魔導師" : score >= 70 ? "高階法師" : "見習法師"}</p>
                        </div>
                        <p className="mb-4">最終法力值：<span className="text-xl font-bold">{score}</span> / 100</p>
                        <hr className="my-4 border-black" />
                        {quizData.map((q, i) => (
                            <div key={i} className="mb-6 text-sm page-break-inside-avoid">
                                <p className="font-bold mb-1">{i+1}. {q.q}</p>
                                <div className="ml-4 space-y-1">
                                    {q.options.map((opt, oIdx) => (
                                        <p key={oIdx} className={userAnswers[i] === oIdx ? "font-bold underline" : ""}>
                                            ({oIdx+1}) {opt} {userAnswers[i] === oIdx && (oIdx === q.correct ? "✓" : "✗")}
                                        </p>
                                    ))}
                                </div>
                                <p className="mt-2 text-xs text-gray-600 italic">奧義解析：{q.hint}</p>
                            </div>
                        ))}
                    </div>

                    <div className="no-print">
                        {/* Header */}
                        <header className="bg-gradient-to-b from-[#1e1b4b] to-[#0f172a] border-b border-[#d4af37]/30 py-12 px-4 text-center">
                            <div className="inline-flex items-center gap-3 px-6 py-2 bg-[#d4af37]/10 rounded-full border border-[#d4af37]/50 mb-6">
                                <Icon name="shield" className="text-[#d4af37]" />
                                <span className="text-[#d4af37] font-bold tracking-widest text-sm uppercase">Jinming Master Trial</span>
                            </div>
                            <h1 className="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#d4af37] via-[#fef3c7] to-[#d4af37] mb-4 magic-text-shadow">
                                字形幻化術：高手大師試煉
                            </h1>
                            <p className="text-indigo-300 font-medium tracking-widest">挑戰最刁鑽的形似字辨析，登頂文學魔法之巔</p>
                        </header>

                        <main className="max-w-5xl mx-auto px-4 py-10">
                            {/* Tabs */}
                            <div className="flex justify-center gap-4 mb-10">
                                <button 
                                    onClick={() => setActiveTab('library')}
                                    className={`px-8 py-3 rounded-2xl font-bold transition-all ${activeTab === 'library' ? 'bg-[#d4af37] text-indigo-950 shadow-lg scale-105' : 'bg-indigo-900/30 text-indigo-300 border border-indigo-800'}`}
                                >
                                    大師圖書館
                                </button>
                                <button 
                                    onClick={() => setActiveTab('quiz')}
                                    className={`px-8 py-3 rounded-2xl font-bold transition-all ${activeTab === 'quiz' ? 'bg-[#d4af37] text-indigo-950 shadow-[0_0_15px_rgba(212,175,55,0.4)] scale-105' : 'bg-indigo-900/30 text-indigo-300 border border-indigo-800'}`}
                                >
                                    大師試煉場
                                </button>
                            </div>

                            {activeTab === 'library' ? (
                                <div className="grid gap-8 animate-in fade-in duration-500">
                                    <div className="bg-amber-900/20 border border-amber-600/30 p-6 rounded-3xl mb-4">
                                        <h3 className="text-[#d4af37] font-bold flex items-center gap-2 mb-2">
                                            <Icon name="info" /> 大師級叮嚀
                                        </h3>
                                        <p className="text-amber-100 text-sm">此單元針對資優班入學考、升私中考題設計，重點在於「微細部首辨析」與「成語固定用字」。</p>
                                    </div>
                                    {libraryData.map((group, idx) => (
                                        <div key={idx} className="bg-indigo-950/40 border border-indigo-800 rounded-[32px] overflow-hidden">
                                            <div className="bg-indigo-900/50 px-8 py-4 border-b border-indigo-800 flex items-center justify-between">
                                                <h2 className="text-[#d4af37] text-xl font-black">{group.title}</h2>
                                                <Icon name="scroll" className="text-[#d4af37]" />
                                            </div>
                                            <div className="p-8 grid md:grid-cols-3 gap-6">
                                                {group.items.map((item, i) => (
                                                    <div key={i} className="magic-card bg-indigo-900/20 p-6 rounded-2xl border border-white/5 group transition-all">
                                                        <div className="flex justify-between items-start mb-2">
                                                            <div className="text-5xl font-black text-white group-hover:text-[#d4af37] transition-colors">{item.char}</div>
                                                            <div className="bg-indigo-950 px-3 py-1 rounded text-xs font-bold text-[#d4af37] border border-[#d4af37]/20">
                                                                {item.zhuyin}
                                                            </div>
                                                        </div>
                                                        <div className="text-[#fef3c7] font-bold text-lg mb-3">{item.usage}</div>
                                                        <div className="text-slate-400 text-sm leading-relaxed border-t border-white/5 pt-3">
                                                            {item.desc}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="max-w-3xl mx-auto animate-in slide-in-from-bottom duration-500">
                                    {!showResult ? (
                                        <div className="bg-indigo-950/60 border border-[#d4af37]/30 p-8 md:p-12 rounded-[48px] backdrop-blur-xl shadow-2xl relative overflow-hidden">
                                            {/* Progress bar */}
                                            <div className="absolute top-0 left-0 h-1 bg-[#d4af37] transition-all duration-300" style={{ width: `${((quizIndex + 1) / quizData.length) * 100}%` }}></div>
                                            
                                            <div className="flex justify-between items-center mb-10">
                                                <span className="text-[#d4af37] font-black tracking-widest text-xs uppercase">Trial Level {quizIndex + 1} / {quizData.length}</span>
                                                <div className="flex gap-2">
                                                    {quizData.map((_, i) => (
                                                        <div key={i} className={`w-3 h-1 rounded-full transition-all ${i === quizIndex ? 'w-8 bg-[#d4af37]' : userAnswers[i] !== undefined ? 'bg-indigo-400' : 'bg-indigo-800'}`}></div>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="mb-10">
                                                <p className="text-2xl md:text-3xl font-black text-white leading-relaxed text-center">
                                                    {quizData[quizIndex].q}
                                                </p>
                                            </div>

                                            <div className="grid gap-4">
                                                {quizData[quizIndex].options.map((opt, idx) => (
                                                    <button
                                                        key={idx}
                                                        onClick={() => handleAnswer(idx)}
                                                        className={`p-6 rounded-3xl font-bold text-left border-2 transition-all flex items-center justify-between group ${
                                                            userAnswers[quizIndex] === idx 
                                                            ? 'bg-[#d4af37]/20 border-[#d4af37] text-[#d4af37]' 
                                                            : 'bg-indigo-900/40 border-indigo-800 hover:border-[#d4af37]/50 text-indigo-200'
                                                        }`}
                                                    >
                                                        <span className="flex items-center gap-5">
                                                            <div className="w-10 h-10 rounded-xl bg-indigo-950 flex items-center justify-center text-[#d4af37] font-black border border-[#d4af37]/20 group-hover:border-[#d4af37]/50">
                                                                {idx + 1}
                                                            </div>
                                                            <span className="text-xl">{opt}</span>
                                                        </span>
                                                        {userAnswers[quizIndex] === idx && <Icon name="sparkle" className="text-[#d4af37]" />}
                                                    </button>
                                                ))}
                                            </div>

                                            <div className="flex justify-between mt-12 pt-8 border-t border-indigo-800">
                                                <button 
                                                    disabled={quizIndex === 0}
                                                    onClick={() => setQuizIndex(quizIndex - 1)}
                                                    className="text-indigo-400 font-bold disabled:opacity-20 flex items-center gap-2 hover:text-white transition-colors"
                                                >
                                                    <Icon name="arrow-left" /> 迴溯
                                                </button>
                                                {Object.keys(userAnswers).length === quizData.length ? (
                                                    <button 
                                                        onClick={finishQuiz}
                                                        className="bg-gradient-to-r from-[#d4af37] to-amber-600 text-indigo-950 px-12 py-4 rounded-2xl font-black shadow-[0_0_20px_rgba(212,175,55,0.4)] hover:scale-105 transition-all"
                                                    >
                                                        完成考核
                                                    </button>
                                                ) : (
                                                    <button 
                                                        disabled={quizIndex === quizData.length - 1}
                                                        onClick={() => setQuizIndex(quizIndex + 1)}
                                                        className="text-indigo-400 font-bold disabled:opacity-20 flex items-center gap-2 hover:text-white transition-colors"
                                                    >
                                                        進階 <Icon name="arrow-right" />
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-8 pb-10">
                                            <div className="text-center bg-indigo-950 border border-[#d4af37]/30 p-12 rounded-[56px] shadow-2xl relative overflow-hidden">
                                                <div className="relative z-10">
                                                    <Icon name="crown" className="w-20 h-20 text-[#d4af37] mx-auto mb-4" />
                                                    <div className="text-sm font-bold text-[#d4af37] uppercase tracking-widest mb-2">Master Assessment Score</div>
                                                    <div className="text-8xl font-black text-white mb-2">{score}</div>
                                                    <div className="text-2xl font-black text-[#fef3c7] mb-8">
                                                        {score >= 90 ? "傳奇大師：字靈之眼已覺醒" : score >= 70 ? "高階法師：洞悉大部分幻術" : "見習生：需重回圖書館閉關"}
                                                    </div>
                                                    
                                                    <div className="max-w-xs mx-auto mb-8">
                                                        <input 
                                                            type="text" 
                                                            value={studentName}
                                                            onChange={(e) => setStudentName(e.target.value)}
                                                            placeholder="輸入法師尊號以領取憑證..."
                                                            className="w-full bg-indigo-900/50 border border-indigo-700 rounded-2xl py-4 px-6 focus:border-[#d4af37] outline-none text-white text-center font-bold"
                                                        />
                                                    </div>

                                                    <div className="flex flex-wrap gap-4 justify-center">
                                                        <button onClick={() => window.print()} className="bg-white text-indigo-950 px-8 py-4 rounded-2xl font-black flex items-center gap-2 hover:bg-[#d4af37] transition-all">
                                                            <Icon name="printer" /> 列印修行憑證
                                                        </button>
                                                        <button onClick={reset} className="bg-indigo-800 text-white px-8 py-4 rounded-2xl font-black flex items-center gap-2 border border-indigo-600 hover:bg-indigo-700 transition-all">
                                                            <Icon name="rotate-ccw" /> 再次試煉
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* 錯題檢閱 */}
                                            <div className="bg-indigo-950/40 border border-indigo-800 rounded-[40px] p-8">
                                                <h4 className="text-[#d4af37] font-black text-xl mb-6 flex items-center gap-2">
                                                    <Icon name="eye" /> 試煉解析
                                                </h4>
                                                <div className="space-y-6">
                                                    {quizData.map((q, i) => {
                                                        const isCorrect = userAnswers[i] === q.correct;
                                                        return (
                                                            <div key={i} className={`p-6 rounded-2xl border transition-all ${isCorrect ? 'bg-emerald-500/5 border-emerald-500/20' : 'bg-rose-500/5 border-rose-500/20'}`}>
                                                                <div className="flex items-start gap-4">
                                                                    <div className={`mt-1 flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-xs font-black ${isCorrect ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white'}`}>
                                                                        {isCorrect ? '✓' : '✗'}
                                                                    </div>
                                                                    <div className="flex-grow">
                                                                        <p className="text-white font-bold mb-4">{i+1}. {q.q}</p>
                                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm mb-4">
                                                                            <div className={`p-3 rounded-xl flex items-center gap-2 ${isCorrect ? 'text-emerald-400 bg-emerald-500/10' : 'text-rose-400 bg-rose-500/10'}`}>
                                                                                <Icon name={isCorrect ? "check-circle" : "x-circle"} className="w-4 h-4" /> 
                                                                                你的回答：{q.options[userAnswers[i]] || "未作答"}
                                                                            </div>
                                                                            {!isCorrect && (
                                                                                <div className="bg-emerald-500/10 p-3 rounded-xl text-emerald-400 flex items-center gap-2">
                                                                                    <Icon name="check-circle" className="w-4 h-4" /> 正確解答：{q.options[q.correct]}
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                        <div className="text-indigo-200 text-sm bg-indigo-950/60 p-4 rounded-xl border border-indigo-800/50 italic leading-relaxed">
                                                                            <span className="font-bold text-[#d4af37] mr-2">✦ 奧義解釋：</span>{q.hint}
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </main>

                        {/* Footer */}
                        <footer className="fixed bottom-0 left-0 right-0 bg-indigo-950/90 backdrop-blur-xl border-t border-[#d4af37]/20 p-4 z-50">
                            <div className="max-w-5xl mx-auto flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-indigo-900 flex items-center justify-center border border-[#d4af37]/30">
                                        <Icon name="award" className="text-[#d4af37] w-6 h-6" />
                                    </div>
                                    <span className="hidden sm:block text-[#d4af37] font-black text-sm tracking-widest">高手專區 ‧ 字形大師試煉 (三階進階)</span>
                                </div>
                                <div className="flex items-center gap-6">
                                    <div className="text-right">
                                        <p className="text-[10px] font-bold text-indigo-400 uppercase">Trial Progress</p>
                                        <p className="text-xl font-black text-white">{Object.keys(userAnswers).length} / {quizData.length}</p>
                                    </div>
                                    <button 
                                        className="bg-[#d4af37] px-6 py-2 rounded-xl text-indigo-950 font-black text-sm hover:scale-105 transition-all shadow-lg"
                                        onClick={() => { setActiveTab('quiz'); reset(); }}
                                    >
                                        重啟試煉
                                    </button>
                                </div>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
