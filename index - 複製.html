<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金名魔法學院 - 私中特訓門戶</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide React Icons (UMD version) -->
    <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #0a0c1b; 
            color: #e2e8f0;
            margin: 0;
            padding: 0;
        }
        .magic-glow { box-shadow: 0 0 20px rgba(251, 191, 36, 0.2); }
        .magic-card-hover { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .magic-card-hover:hover { 
            transform: translateY(-12px); 
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7);
            border-color: rgba(251, 191, 36, 0.4);
        }
        /* 響應式文字調整 */
        @media (max-width: 640px) {
            .hero-title { font-size: 2.25rem; line-height: 2.5rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // 修正：UMD 版本中全域變數通常為 LucideReact (大寫 L)
        const LucideIcons = window.LucideReact || window.lucideReact || {};
        const { 
            Book, Sparkles, Lock, Unlock, LogOut, MessageSquare, 
            CreditCard, ChevronRight, Loader2, Diamond, Zap, 
            Scroll, Wand2, User, Trophy, School 
        } = LucideIcons;

        // 防錯機制：如果圖示未定義，則提供一個空的組件以免報錯
        const SafeIcon = ({ icon: Icon, ...props }) => Icon ? <Icon {...props} /> : null;

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jingming-magic-academy';

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(false);
            const [permissions, setPermissions] = useState({
                chinese: false,
                math: false,
                english: false
            });
            const [showModal, setShowModal] = useState(null);

            const handleLogin = () => {
                setLoading(true);
                setTimeout(() => {
                    setUser({ email: 'magic_student@jingming.edu', uid: 'temp_user_id' });
                    setLoading(false);
                }, 800);
            };

            const subjects = [
                {
                    id: 'chinese',
                    title: '國語魔法卷軸',
                    desc: '解鎖高階成語、國學常識與應用文。精修詞章秘法，掌握文字精髓。',
                    color: 'from-emerald-700 to-teal-900',
                    borderColor: 'border-emerald-400/20',
                    url: 'https://mocher235-byte.github.io/chinese-exam/',
                    hasAccess: permissions.chinese,
                    IconComp: Scroll
                },
                {
                    id: 'math',
                    title: '數學邏輯水晶',
                    desc: '邏輯推理與幾何空間之奧秘。精準解析私中熱門題型，計算如魔法般精確。',
                    color: 'from-amber-600 to-orange-900',
                    borderColor: 'border-amber-400/20',
                    url: 'https://mocher235-byte.github.io/math-exam/',
                    hasAccess: permissions.math,
                    IconComp: Zap
                },
                {
                    id: 'english',
                    title: '英語語法魔杖',
                    desc: '從代名詞到進階語法。掌握英語魔咒，讓外語溝通揮灑自如。',
                    color: 'from-indigo-700 to-purple-950',
                    borderColor: 'border-indigo-400/20',
                    url: 'https://mocher235-byte.github.io/English-Exam/',
                    hasAccess: permissions.english,
                    IconComp: Wand2
                }
            ];

            return (
                <div className="min-h-screen flex flex-col">
                    {/* 頂部裝飾 */}
                    <div className="h-1.5 w-full bg-gradient-to-r from-transparent via-amber-400 to-transparent shadow-lg shadow-amber-500/20"></div>

                    {/* 導覽列 */}
                    <nav className="bg-[#0f1225]/95 backdrop-blur-md sticky top-0 z-40 border-b border-amber-900/30">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-gradient-to-br from-amber-400 to-amber-600 p-2 rounded-xl text-[#0a0c1b] magic-glow">
                                    <SafeIcon icon={Sparkles} size={24} strokeWidth={2.5} />
                                </div>
                                <span className="text-xl font-black tracking-[0.15em] text-amber-400">金名魔法學院</span>
                            </div>

                            <div className="flex items-center gap-4">
                                {user ? (
                                    <div className="flex items-center gap-3 sm:gap-6">
                                        <div className="hidden md:block text-right border-r border-amber-900/50 pr-4">
                                            <p className="text-[10px] text-amber-500/60 tracking-widest uppercase font-bold">Magician Status</p>
                                            <p className="text-sm font-bold text-amber-100">{user.email}</p>
                                        </div>
                                        <button onClick={() => setUser(null)} className="p-2 text-gray-400 hover:text-red-400 transition-colors bg-white/5 rounded-full">
                                            <SafeIcon icon={LogOut} size={20} />
                                        </button>
                                    </div>
                                ) : (
                                    <button onClick={handleLogin} className="border-2 border-amber-500/50 text-amber-400 px-5 sm:px-8 py-2 rounded-full font-black hover:bg-amber-500/10 transition-all active:scale-95 text-xs sm:text-sm tracking-widest">
                                        學院登入
                                    </button>
                                )}
                            </div>
                        </div>
                    </nav>

                    {/* 主視覺區 */}
                    <header className="relative py-24 px-6 text-center">
                        <div className="max-w-4xl mx-auto relative z-10">
                            <div className="inline-flex items-center gap-3 bg-amber-500/10 border border-amber-500/20 px-6 py-2.5 rounded-full mb-12 animate-pulse">
                                <SafeIcon icon={Diamond} size={16} className="text-amber-400" />
                                <span className="text-[10px] sm:text-xs font-black tracking-[0.2em] text-amber-200 uppercase">認真讀書 • 領取高額寶石卡獎勵</span>
                            </div>
                            
                            <h1 className="hero-title text-5xl md:text-7xl font-black mb-8 leading-tight text-white tracking-tight text-center">
                                挑戰私中入學<br/>
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-amber-400 to-amber-200 italic">
                                    魔法特訓門戶
                                </span>
                            </h1>
                            
                            <div className="h-1 w-20 bg-gradient-to-r from-transparent via-amber-500 to-transparent mx-auto mb-10"></div>
                            
                            <p className="text-base md:text-xl text-gray-400 max-w-2xl mx-auto leading-relaxed font-medium px-4 text-center">
                                金名文理補習班專用魔法教材，針對國、數、英三大領域，<br className="hidden md:block" />
                                精準解析核心試題，助你在競爭中脫穎而出。
                            </p>
                        </div>
                    </header>

                    {/* 教學科目 */}
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 pb-32">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 lg:gap-12">
                            {subjects.map(subject => (
                                <div key={subject.id} className={`magic-card-hover group relative bg-[#131730] rounded-[3rem] p-1 border ${subject.borderColor} flex flex-col`}>
                                    <div className={`rounded-[2.8rem] bg-gradient-to-b ${subject.color} p-10 flex flex-col h-full items-center text-center`}>
                                        <div className="relative mb-10">
                                            <div className="bg-black/40 p-6 rounded-[2rem] backdrop-blur-xl border border-white/10 group-hover:scale-110 transition-transform duration-500">
                                                <SafeIcon icon={subject.IconComp} size={48} strokeWidth={1.5} className="text-white" />
                                            </div>
                                            <div className="absolute -top-3 -right-3 text-center">
                                                {subject.hasAccess ? (
                                                    <span className="bg-emerald-500 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg shadow-emerald-900/40">魔力已解鎖</span>
                                                ) : (
                                                    <span className="bg-black/60 text-amber-500/90 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-amber-500/30 text-center">魔法封印中</span>
                                                )}
                                            </div>
                                        </div>

                                        <h3 className="text-2xl font-black text-white mb-5 tracking-tight text-center">{subject.title}</h3>
                                        <p className="text-white/70 text-sm leading-relaxed mb-12 flex-grow font-medium text-center">
                                            {subject.desc}
                                        </p>

                                        {subject.hasAccess ? (
                                            <a href={subject.url} className="w-full py-4.5 rounded-2xl bg-white text-[#0a0c1b] font-black text-sm tracking-[0.25em] uppercase flex items-center justify-center gap-2 hover:bg-amber-400 transition-all shadow-2xl active:scale-95">
                                                進入修煉 <SafeIcon icon={ChevronRight} size={20} />
                                            </a>
                                        ) : (
                                            <button onClick={() => setShowModal('buy')} className="w-full py-4.5 rounded-2xl bg-black/40 text-white/60 font-black text-sm tracking-[0.2em] border border-white/10 hover:bg-black/60 hover:text-white transition-all flex items-center justify-center gap-2">
                                                立即解鎖魔法 <SafeIcon icon={Lock} size={18} />
                                            </button>
                                        )}

                                        <div className="mt-8 pt-5 border-t border-white/10 w-full flex items-center justify-center gap-2 text-[10px] font-black text-amber-300/80 tracking-[0.2em] uppercase text-center">
                                            <SafeIcon icon={Diamond} size={14} className="fill-amber-300/30" /> 多次觀看 • 贏取獎勵
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* 學院特權 */}
                        <section className="mt-40 pt-20 border-t border-amber-900/20">
                            <div className="text-center mb-20">
                                <div className="inline-block px-5 py-1.5 rounded-full border border-amber-500/20 text-[10px] font-black text-amber-400 tracking-[0.4em] uppercase mb-6 bg-amber-500/5">Academy Privileges</div>
                                <h2 className="text-4xl font-black text-white tracking-widest text-center">學院特權</h2>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                                {[
                                    { icon: Book, title: "魔法教材", desc: "專為私中入學精心編制" },
                                    { icon: User, title: "權限控管", desc: "購買科目，多次觀看課程" },
                                    { icon: Diamond, title: "寶石獎勵", desc: "認真讀書領取高額獎品" },
                                    { icon: MessageSquare, title: "魔導諮詢", desc: "專業老師線上解惑輔導" }
                                ].map((f, i) => (
                                    <div key={i} className="bg-[#0f1225] p-10 rounded-[2.5rem] border border-white/5 hover:border-amber-500/30 transition-all group text-center flex flex-col items-center">
                                        <div className="p-6 rounded-3xl bg-amber-500/10 text-amber-500 mb-8 group-hover:scale-110 group-hover:bg-amber-500/20 transition-all duration-500">
                                            <SafeIcon icon={f.icon} size={36} strokeWidth={1.5} />
                                        </div>
                                        <h4 className="font-black text-amber-100 mb-4 text-xl tracking-wide text-center">{f.title}</h4>
                                        <p className="text-sm text-gray-500 leading-relaxed font-medium text-center">{f.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    {/* 頁尾 */}
                    <footer className="bg-[#05060d] py-24 px-6 border-t border-white/5 text-center mt-auto">
                        <div className="flex items-center justify-center gap-3 mb-10">
                            <div className="bg-white/5 p-2.5 rounded-xl text-amber-500 shadow-lg shadow-amber-500/10">
                                <SafeIcon icon={Sparkles} size={28} />
                            </div>
                            <span className="font-black text-2xl text-white tracking-[0.4em] uppercase text-center">金名魔法學院</span>
                        </div>
                        <p className="text-gray-600 text-sm font-medium mb-12 tracking-widest text-center">
                            © 2024 金名文理補習班 • 認真讀書，成就魔法未來
                        </p>
                        <div className="flex flex-wrap justify-center gap-10 text-[10px] font-black text-gray-500 tracking-[0.3em] uppercase">
                            <a href="#" className="hover:text-amber-400 transition-colors">入學章程</a>
                            <a href="#" className="hover:text-amber-400 transition-colors px-6 border-x border-white/10">寶石制度</a>
                            <a href="#" className="hover:text-amber-400 transition-colors">聯繫導師</a>
                        </div>
                    </footer>

                    {/* 購買對話框 */}
                    {showModal === 'buy' && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/85 backdrop-blur-md">
                            <div className="bg-[#1a1f3c] border border-amber-500/40 rounded-[3.5rem] max-w-md w-full p-12 text-center shadow-2xl shadow-amber-500/10">
                                <div className="bg-amber-500/20 w-28 h-28 rounded-full flex items-center justify-center text-amber-400 mx-auto mb-10 shadow-inner">
                                    <SafeIcon icon={Wand2} size={56} strokeWidth={1} />
                                </div>
                                <h3 className="text-3xl font-black text-amber-100 mb-6 tracking-tight text-center">開啟魔法大門</h3>
                                <p className="text-gray-400 mb-12 leading-relaxed font-medium text-center px-4">
                                    購買科目後即可<span className="text-amber-400 font-black"> 多次觀看 </span>特訓內容。<br/>
                                    認真完成修煉，更可獲得<br/>
                                    <span className="text-white font-black tracking-widest underline decoration-amber-500 decoration-2 underline-offset-8">高額寶石卡獎勵！</span>
                                </p>
                                <div className="space-y-4">
                                    <button onClick={() => window.open('https://line.me', '_blank')} className="w-full bg-[#00B900] text-white py-5 rounded-[1.25rem] font-black text-sm tracking-[0.3em] uppercase hover:brightness-110 shadow-xl active:scale-95 transition-all">透過 LINE 洽詢開通</button>
                                    <button onClick={() => setShowModal(null)} className="w-full py-4 text-gray-500 font-black hover:text-gray-300 transition-colors tracking-widest text-sm text-center">暫時離開</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
