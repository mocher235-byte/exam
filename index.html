<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金名魔法學院 - 私中特訓門戶</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide React Icons -->
    <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.min.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBz_xnB9dMa9-FD8RGG8Mc4cRO5gccAFAE",
            authDomain: "project-5284569428112872001.firebaseapp.com",
            projectId: "project-5284569428112872001",
            storageBucket: "project-5284569428112872001.firebasestorage.app",
            messagingSenderId: "983824885502",
            appId: "1:983824885502:web:e4e32c98577f5fbdfde7af",
            measurementId: "G-JMGFDBPMRE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.magicAcademy = { 
            auth, 
            db, 
            actions: { signInAnonymously, onAuthStateChanged, signOut, doc, onSnapshot } 
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #060813; 
            color: #e2e8f0; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }
        
        /* 魔法發光效果 */
        .magic-glow { box-shadow: 0 0 30px rgba(251, 191, 36, 0.2); }
        
        /* 卡片懸停動畫 */
        .magic-card-hover { 
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }
        .magic-card-hover:hover { 
            transform: translateY(-15px); 
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.8);
            border-color: rgba(251, 191, 36, 0.5);
        }

        /* 旋轉動畫 */
        .loader-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 背景微光 */
        .ambient-light {
            position: fixed;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(55, 65, 181, 0.15) 0%, rgba(6, 8, 19, 0) 70%);
            top: -20vw;
            right: -10vw;
            z-index: -1;
            pointer-events: none;
        }

        /* 模擬截圖中的特殊圓圈 */
        .subject-circle {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(251, 191, 36, 0.3);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 15px rgba(251, 191, 36, 0.1);
        }
        .subject-circle::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px solid rgba(251, 191, 36, 0.1);
        }
    </style>
</head>
<body>
    <div class="ambient-light"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const LucideIcons = window.lucide || window.LucideReact || {};
        const { 
            Sparkles, Lock, LogOut, ChevronRight, Loader2, Diamond, Zap, 
            Scroll, Wand2, ShieldCheck, ExternalLink, MapPin, Phone, Calendar
        } = LucideIcons;

        const SafeIcon = ({ icon: Icon, ...props }) => Icon ? <Icon {...props} /> : null;

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authLoading, setAuthLoading] = useState(false);
            const [permissions, setPermissions] = useState({ chinese: false, math: false, english: false });
            const [showModal, setShowModal] = useState(null);

            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.magicAcademy) {
                        clearInterval(checkFirebase);
                        const { auth, db, actions } = window.magicAcademy;

                        actions.onAuthStateChanged(auth, (currentUser) => {
                            setUser(currentUser);
                            if (currentUser) {
                                const docRef = actions.doc(db, "artifacts", "jingming-magic-academy", "users", currentUser.uid, "profile", "data");
                                actions.onSnapshot(docRef, (docSnap) => {
                                    if (docSnap.exists()) {
                                        const data = docSnap.data();
                                        if (data.permissions) setPermissions(data.permissions);
                                    }
                                    setLoading(false);
                                }, (err) => {
                                    console.error("Firestore error:", err);
                                    setLoading(false);
                                });
                            } else {
                                setPermissions({ chinese: false, math: false, english: false });
                                setLoading(false);
                            }
                        });
                    }
                }, 100);
                return () => clearInterval(checkFirebase);
            }, []);

            const handleLogin = async () => {
                if (!window.magicAcademy) return;
                setAuthLoading(true);
                try {
                    await window.magicAcademy.actions.signInAnonymously(window.magicAcademy.auth);
                } catch (e) { 
                    console.error("Login failed", e);
                } finally { 
                    setAuthLoading(false); 
                }
            };

            const handleLogout = () => window.magicAcademy?.actions.signOut(window.magicAcademy.auth);

            const subjects = [
                { 
                    id: 'chinese', 
                    char: '國',
                    title: '國語魔法卷軸', 
                    desc: '解鎖高階成語、國學常識與應用文。精修詞章秘法，掌握文字精髓。', 
                    bgClass: 'from-[#0d1a1a] to-[#060813]',
                    circleBg: 'bg-[#0a2e28]',
                    borderColor: 'border-emerald-500/30',
                    url: './Chinese-Exam/index.html', 
                    hasAccess: permissions.chinese 
                },
                { 
                    id: 'math', 
                    char: '數',
                    title: '數學邏輯水晶', 
                    desc: '邏輯推理與幾何空間之奧秘。精準解析私中熱門題型，計算如魔法般精確。', 
                    bgClass: 'from-[#1a0f0f] to-[#060813]',
                    circleBg: 'bg-[#3b1515]',
                    borderColor: 'border-orange-500/30',
                    url: './Math-Exam/index.html', 
                    hasAccess: permissions.math 
                },
                { 
                    id: 'english', 
                    char: '英',
                    title: '英語語法魔杖', 
                    desc: '從代名詞到進階語法。掌握英語魔咒，讓外語溝通揮灑自如。', 
                    bgClass: 'from-[#120f26] to-[#060813]',
                    circleBg: 'bg-[#1e144a]',
                    borderColor: 'border-indigo-500/30',
                    url: './English-Exam/index.html', 
                    hasAccess: permissions.english 
                }
            ];

            const schools = [
                {
                    name: "金名竹北校",
                    phone: "03-6560002",
                    address: "竹北市國興街28-1號(竹北國中側門)",
                    history: "2011年成立",
                    link: "https://share.google/LjA0ep0IBUpaqT4Pw"
                },
                {
                    name: "金名東興校",
                    phone: "03-6585122",
                    address: "竹北市嘉豐11路2段69號(東興國小)",
                    history: "2016年成立",
                    link: "https://share.google/lHzQgD2J6eSx5p851"
                },
                {
                    name: "金名德晉校",
                    phone: "03-6572508",
                    address: "竹北市文孝街23號(補教協會2樓)",
                    history: "2023年成立",
                    link: "https://share.google/kF7KmSOl6BN2IOaQD"
                }
            ];

            if (loading) return (
                <div className="min-h-screen bg-[#060813] flex flex-col items-center justify-center gap-6">
                    <SafeIcon icon={Loader2} className="loader-spin text-amber-500 w-16 h-16" />
                    <p className="text-amber-200/50 text-sm tracking-widest animate-pulse font-bold">正在連結魔法門戶...</p>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    {/* 導覽列 */}
                    <nav className="bg-[#0f1225]/80 backdrop-blur-xl sticky top-0 z-50 border-b border-white/5">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-4 group cursor-default">
                                <div className="bg-gradient-to-br from-amber-400 to-amber-600 p-2.5 rounded-2xl text-[#0a0c1b] magic-glow group-hover:scale-110 transition-transform"><SafeIcon icon={Sparkles} size={24} strokeWidth={2.5} /></div>
                                <div className="flex flex-col">
                                    <span className="text-xl font-black tracking-[0.2em] text-white">金名魔法學院</span>
                                    <span className="text-[10px] text-amber-500 font-bold uppercase tracking-widest">Jingming Magic Academy</span>
                                </div>
                            </div>
                            
                            {user ? (
                                <div className="flex items-center gap-5">
                                    <div className="hidden md:flex flex-col items-end">
                                        <span className="text-[10px] text-gray-500 font-mono tracking-tighter">STUDENT ID</span>
                                        <span className="text-xs text-amber-200/70 font-bold">{user.uid.substring(0,12).toUpperCase()}</span>
                                    </div>
                                    <button onClick={handleLogout} className="group p-3 text-gray-400 hover:text-red-400 transition-all bg-white/5 rounded-2xl hover:bg-red-500/10">
                                        <SafeIcon icon={LogOut} size={20} />
                                    </button>
                                </div>
                            ) : (
                                <button onClick={handleLogin} disabled={authLoading} className="relative overflow-hidden bg-white/5 border border-amber-500/30 text-amber-400 px-8 py-3 rounded-2xl font-black hover:bg-amber-500/10 transition-all text-sm tracking-[0.2em] flex items-center gap-3">
                                    {authLoading ? <SafeIcon icon={Loader2} className="loader-spin w-4 h-4" /> : <SafeIcon icon={ShieldCheck} size={18} />}
                                    學院登入
                                </button>
                            )}
                        </div>
                    </nav>

                    {/* 標題區 */}
                    <header className="pt-24 pb-16 px-6 text-center relative">
                        <div className="max-w-4xl mx-auto">
                            <div className="inline-flex items-center gap-3 bg-amber-500/10 border border-amber-500/20 px-6 py-2.5 rounded-full mb-10 shadow-lg shadow-amber-900/10">
                                <SafeIcon icon={Diamond} size={16} className="text-amber-400" />
                                <span className="text-[11px] font-black tracking-[0.15em] text-amber-200 uppercase">認真讀書 • 領取高額寶石卡獎勵</span>
                            </div>
                            <h1 className="text-5xl md:text-8xl font-black mb-8 leading-tight text-white tracking-tight">
                                挑戰私中入學<br/>
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-amber-500 to-amber-200 italic drop-shadow-sm">
                                    魔法特訓門戶
                                </span>
                            </h1>
                            <p className="text-gray-400 max-w-2xl mx-auto text-lg leading-relaxed font-medium">
                                金名文理補習班專用魔法教材。透過深度特訓與邏輯修煉，成就屬於你的魔法未來。
                            </p>
                        </div>
                    </header>

                    {/* 學科卡片 */}
                    <main className="max-w-7xl mx-auto px-6 pb-32 grid grid-cols-1 md:grid-cols-3 gap-8">
                        {subjects.map(s => (
                            <div key={s.id} className={`magic-card-hover group bg-[#0e1122] rounded-[3.5rem] p-1.5 border ${s.borderColor}`}>
                                <div className={`rounded-[3.3rem] bg-gradient-to-b ${s.bgClass} p-12 flex flex-col h-full items-center text-center overflow-hidden relative`}>
                                    <div className="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-white/5 to-transparent pointer-events-none"></div>
                                    <div className="mb-8">
                                        {s.hasAccess ? (
                                            <span className="flex items-center gap-1.5 bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest">
                                                <div className="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></div> 魔力已解鎖
                                            </span>
                                        ) : (
                                            <span className="text-amber-500/80 text-[11px] font-black tracking-[0.3em] uppercase">魔法封印</span>
                                        )}
                                    </div>
                                    <div className="mb-10 relative">
                                        <div className={`subject-circle ${s.circleBg} group-hover:scale-110 transition-transform duration-700`}>
                                            <span className="text-5xl font-black text-amber-400 drop-shadow-[0_0_10px_rgba(251,191,36,0.5)]">{s.char}</span>
                                        </div>
                                    </div>
                                    <h3 className="text-3xl font-black text-white mb-6 tracking-wide">{s.title}</h3>
                                    <p className="text-gray-400 text-base mb-12 flex-grow leading-relaxed px-2">{s.desc}</p>
                                    {s.hasAccess ? (
                                        <a href={s.url} className="w-full py-5 rounded-[1.5rem] bg-white text-[#0a0c1b] font-black text-sm tracking-[0.2em] uppercase flex items-center justify-center gap-3 hover:bg-amber-400 transition-all group/btn shadow-xl shadow-white/5">
                                            進入修煉 <SafeIcon icon={ExternalLink} size={20} className="group-hover/btn:translate-x-1 group-hover/btn:-translate-y-1 transition-transform" />
                                        </a>
                                    ) : (
                                        <button onClick={() => setShowModal('buy')} className="w-full py-5 rounded-[1.5rem] bg-white/5 text-white/50 font-black text-sm tracking-[0.2em] border border-white/10 hover:bg-white/10 transition-all flex items-center justify-center gap-3">
                                            立即解鎖魔法 <SafeIcon icon={Lock} size={18} />
                                        </button>
                                    )}
                                    <div className="mt-10 pt-6 border-t border-white/5 w-full flex items-center justify-center gap-3 text-[10px] font-bold text-amber-400/60 tracking-[0.2em] uppercase">
                                        多次觀看 • 贏取獎勵
                                    </div>
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* 頁尾 */}
                    <footer className="py-20 border-t border-white/5 bg-[#080a18]">
                        <div className="max-w-7xl mx-auto px-6">
                            {/* 校區資訊 */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-12 mb-16">
                                {schools.map((school, idx) => (
                                    <div key={idx} className="flex flex-col gap-4 group">
                                        <div className="flex items-center gap-3 mb-2">
                                            <h4 className="text-xl font-black text-white tracking-widest group-hover:text-amber-400 transition-colors">{school.name}</h4>
                                        </div>
                                        <div className="space-y-3 text-sm text-gray-400 font-medium">
                                            <div className="flex items-start gap-3 hover:text-amber-200 transition-colors">
                                                <SafeIcon icon={Phone} size={16} className="mt-0.5 text-amber-500/50" />
                                                <a href={`tel:${school.phone}`}>{school.phone}</a>
                                            </div>
                                            <div className="flex items-start gap-3 hover:text-amber-200 transition-colors">
                                                <SafeIcon icon={MapPin} size={16} className="mt-0.5 text-amber-500/50" />
                                                <p className="leading-relaxed">{school.address}</p>
                                            </div>
                                            <div className="flex items-start gap-3 text-amber-500/40 italic">
                                                <SafeIcon icon={Calendar} size={16} className="mt-0.5" />
                                                <p className="text-xs uppercase font-bold tracking-widest">~{school.history}</p>
                                            </div>
                                            <a href={school.link} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 mt-4 text-xs font-black text-amber-400 uppercase tracking-[0.2em] border-b border-amber-400/30 pb-1 hover:border-amber-400 transition-all">
                                                查看地圖座標 <SafeIcon icon={ChevronRight} size={14} />
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* 版權宣告 */}
                            <div className="pt-10 border-t border-white/5 flex flex-col md:flex-row items-center justify-between gap-8 text-gray-500">
                                <div className="flex flex-col md:items-start items-center gap-2">
                                    <p className="text-sm font-bold tracking-wide">© 2026 金名文理補習班. 專業私中特訓班魔法傳承.</p>
                                    <p className="text-[10px] opacity-50 uppercase tracking-[0.2em]">Crafted for excellence in Zhubei City</p>
                                </div>
                                <div className="flex items-center gap-8 text-xs font-bold tracking-[0.15em] uppercase">
                                    <a href="#" className="hover:text-amber-500 transition-colors">學院章程</a>
                                    <a href="#" className="hover:text-amber-500 transition-colors">隱私保護</a>
                                    <a href="#" className="hover:text-amber-500 transition-colors">魔法支援</a>
                                </div>
                            </div>
                        </div>
                    </footer>

                    {/* 購買彈窗 */}
                    {showModal === 'buy' && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-xl transition-all">
                            <div className="bg-[#0e1122] border border-amber-500/40 rounded-[4rem] max-w-md w-full p-8 md:p-12 text-center relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-amber-500 to-transparent"></div>
                                
                                {/* 頂部裝飾圓圈 */}
                                <div className="bg-white/5 w-24 h-24 rounded-full flex items-center justify-center text-amber-400 mx-auto mb-8 border border-white/10 shadow-inner">
                                    <SafeIcon icon={Wand2} size={48} className="opacity-20" />
                                </div>
                                
                                <h3 className="text-3xl md:text-4xl font-black text-white mb-6 tracking-tight">開啟魔法大門</h3>
                                
                                {/* 描述文字：支援自動換行與置中 */}
                                <div className="text-gray-400 mb-10 leading-relaxed text-sm md:text-base px-2">
                                    <p className="inline md:block">購買科目後即可</p>
                                    <span className="text-amber-400 font-black mx-1">多次觀看</span>
                                    <p className="inline md:block">特訓內容，更可獲得</p>
                                    <div className="relative inline-block md:block mt-1">
                                        <span className="text-white font-black">高額寶石卡獎勵！</span>
                                        <div className="absolute -bottom-1 left-0 w-full h-0.5 bg-amber-500 rounded-full"></div>
                                    </div>
                                </div>
                                
                                <div className="flex flex-col gap-6">
                                    {/* LINE 按鈕：使用 image_5c8409.png 中的亮綠色 */}
                                    <button 
                                        onClick={() => window.open('https://line.me/ti/p/vQcf6cONnl', '_blank')} 
                                        className="w-full bg-[#00c300] hover:bg-[#00e600] text-white py-5 rounded-[2rem] font-black text-base md:text-lg tracking-[0.2em] uppercase transition-all shadow-[0_10px_30px_-5px_rgba(0,195,0,0.4)] flex items-center justify-center gap-3 group"
                                    >
                                        透過 LINE 洽詢開通
                                    </button>
                                    
                                    <button 
                                        onClick={() => setShowModal(null)} 
                                        className="text-gray-500 font-bold hover:text-gray-300 transition-colors text-sm tracking-[0.2em] uppercase"
                                    >
                                        暫時返回學院
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
