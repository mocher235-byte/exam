<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金名魔法學院 - 私中特訓門戶</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { 
            getAuth, 
            GoogleAuthProvider, 
            signInWithPopup, 
            RecaptchaVerifier, 
            signInWithPhoneNumber,
            onAuthStateChanged, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBz_xnB9dMa9-FD8RGG8Mc4cRO5gccAFAE",
            authDomain: "project-5284569428112872001.firebaseapp.com",
            projectId: "project-5284569428112872001",
            storageBucket: "project-5284569428112872001.firebasestorage.app",
            messagingSenderId: "983824885502",
            appId: "1:983824885502:web:e4e32c98577f5fbdfde7af",
            measurementId: "G-JMGFDBPMRE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.magicAcademy = { 
            auth, 
            db, 
            actions: { 
                GoogleAuthProvider, 
                signInWithPopup, 
                RecaptchaVerifier, 
                signInWithPhoneNumber,
                onAuthStateChanged, 
                signOut, 
                doc, 
                onSnapshot 
            } 
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #060813; color: #e2e8f0; margin: 0; padding: 0; overflow-x: hidden; }
        
        .magic-glow { box-shadow: 0 0 40px rgba(251, 191, 36, 0.1); }
        .text-glow { text-shadow: 0 0 12px rgba(251, 191, 36, 0.4); }
        
        .floating-line {
            animation: float 4s ease-in-out infinite;
            transform-style: preserve-3d;
            box-shadow: 0 10px 25px rgba(0, 185, 0, 0.3), inset 0 -4px 8px rgba(0,0,0,0.2);
            background: linear-gradient(135deg, #00E000 0%, #00B900 100%);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }

        .loader-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .magic-card {
            background: linear-gradient(180deg, rgba(25, 30, 60, 0.9) 0%, rgba(10, 12, 30, 1) 100%);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .magic-card:hover {
            transform: translateY(-12px);
            border-color: rgba(251, 191, 36, 0.3);
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }

        .seal-circle {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(251, 191, 36, 0.2);
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .seal-circle::after {
            content: "魔法封印";
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #fbbf24;
            font-weight: 900;
            white-space: nowrap;
            letter-spacing: 3px;
            opacity: 0.8;
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
        }

        .magic-modal {
            background: #131730;
            border: 1px solid rgba(251, 191, 36, 0.2);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
        }

        .line-bubble {
            background: rgba(55, 65, 81, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
        }
        .line-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 24px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid rgba(55, 65, 81, 0.9);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">

            Users: (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            MapPin: (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
            Phone: (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
            ExternalLink: (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
            History: (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>,
            Line: (p) => <svg {...p} viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M24 10.304c0-5.23-5.384-9.486-12-9.486s-12 4.256-12 9.486c0 4.69 4.27 8.604 10.052 9.354.392.084.924.258 1.058.592.12.302.078.776.038 1.082l-.164 1.022c-.05.3-.234 1.174 1.008.64 1.242-.534 6.702-3.948 9.14-6.762 1.688-1.854 2.868-3.84 2.868-5.928zm-15.034 5.302h-2.316a.44.44 0 0 1-.44-.44V9.658a.44.44 0 0 1 .44-.44h.44a.44.44 0 0 1 .44.44v4.748h1.436a.44.44 0 0 1 .44.44v.42a.44.44 0 0 1-.44.44zm2.146-.44a.44.44 0 0 1-.44.44h-.442a.44.44 0 0 1-.44-.44V9.658a.44.44 0 0 1 .44-.44h.442a.44.44 0 0 1 .44.44v5.508zm5.558 0a.44.44 0 0 1-.44.44H15.01a.44.44 0 0 1-.44-.44v-5.508a.44.44 0 0 1 .44-.44h.442a.44.44 0 0 1 .44.44v2.79l1.64-2.79h.002a.44.44 0 0 1 .398-.242h.494a.44.44 0 0 1 .38.664l-1.378 2.34 1.5 2.624a.44.44 0 0 1-.384.664h-.54a.44.44 0 0 1-.382-.224l-1.284-2.246v1.932zm4.354-2.12a.44.44 0 0 1-.44.44h-1.434v.784h1.434a.44.44 0 0 1 .44.44v.42a.44.44 0 0 1-.44.44H17.84a.44.44 0 0 1-.44-.44V9.658a.44.44 0 0 1 .44-.44h2.21a.44.44 0 0 1 .44.44v.42a.44.44 0 0 1-.44.44h-1.434v.756h1.434a.44.44 0 0 1 .44.44v.42z"/></svg>,
            Loader: (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>,
            Google: (p) => <svg {...p} viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.26 1.07-3.71 1.07-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.11c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.09H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.91l3.66-2.8z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.09l3.66 2.84c.87-2.6 3.3-4.55 6.16-4.55z" fill="#EA4335"/></svg>
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [permissions, setPermissions] = useState({ chinese: false, math: false, english: false });
            const [showModal, setShowModal] = useState(null);
            const [phoneNumber, setPhoneNumber] = useState("");
            const [verificationCode, setVerificationCode] = useState("");
            const [verificationId, setVerificationId] = useState(null);

            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.magicAcademy) {
                        clearInterval(checkFirebase);
                        const { auth, db, actions } = window.magicAcademy;
                        actions.onAuthStateChanged(auth, (currentUser) => {
                            setUser(currentUser);
                            if (currentUser) {
                                const docRef = actions.doc(db, "artifacts", "jingming-magic-academy", "users", currentUser.uid, "profile", "data");
                                actions.onSnapshot(docRef, (docSnap) => {
                                    if (docSnap.exists()) {
                                        const data = docSnap.data();
                                        if (data.permissions) setPermissions(data.permissions);
                                    }
                                    setLoading(false);
                                }, () => setLoading(false));
                            } else {
                                setPermissions({ chinese: false, math: false, english: false });
                                setLoading(false);
                            }
                        });
                    }
                }, 100);
            }, []);

            const handleGoogleLogin = async () => {
                const { auth, actions } = window.magicAcademy;
                const provider = new actions.GoogleAuthProvider();
                try {
                    await actions.signInWithPopup(auth, provider);
                    setShowModal(null);
                } catch (error) {
                    console.error("Login failed", error);
                }
            };

            const handleUnlock = (subjectId) => {
                if (!user) {
                    setShowModal('login');
                    return;
                }
                if (permissions[subjectId]) {
                    window.open(`https://mocher235-byte.github.io/jingming/#/lesson/${subjectId}`, '_blank');
                } else {
                    setShowModal('unauthorized');
                }
            };

            const branches = [
                { name: "金名竹北校", tel: "03-6560002", addr: "竹北市國興街28-1號(竹北國中側門)", year: "2011年成立", map: "https://share.google/LjA0ep0IBUpaqT4Pw" },
                { name: "金名東興校", tel: "03-6585122", addr: "竹北市嘉豐11路2段69號(東興國小)", year: "2016年成立", map: "https://share.google/lHzQgD2J6eSx5p851" },
                { name: "金名德晉校", tel: "03-6572508", addr: "竹北市文孝街23號(補教協會2樓)", year: "2023年成立", map: "https://share.google/kF7KmSOl6BN2IOaQD" }
            ];

            const privileges = [
                { title: "魔法教材", desc: "專為私中入學精心編制", icon: Icons.Book },
                { title: "權限控管", desc: "購買科目，多次觀看課程", icon: Icons.Shield },
                { title: "寶石獎勵", desc: "認真讀書領取高額獎品", icon: Icons.Trophy },
                { title: "魔導諮詢", desc: "專業老師線上解惑輔導", icon: Icons.Users }
            ];

            const subjects = [
                { id: 'chinese', title: '國語魔法卷軸', char: '國', desc: '解鎖高階成語、國學常識與應用文。精修詞章秘法，掌握文字精髓。', color: 'from-emerald-500/30 to-emerald-900/60', btnHover: 'hover:bg-emerald-500', icon: Icons.Sparkles },
                { id: 'math', title: '數學邏輯水晶', char: '數', desc: '邏輯推理與幾何空間之奧秘。精準解析私中熱門題型，計算如魔法般精確。', color: 'from-orange-500/30 to-red-900/60', btnHover: 'hover:bg-orange-500', icon: Icons.Zap },
                { id: 'english', title: '英語語法魔杖', char: '英', desc: '從代名詞到進階語法。掌握英語魔咒，讓外語溝通揮灑自如。', color: 'from-indigo-600/30 to-purple-900/60', btnHover: 'hover:bg-indigo-600', icon: Icons.Sparkles }
            ];

            if (loading) return (
                <div className="min-h-screen bg-[#060813] flex items-center justify-center">
                    <Icons.Loader className="loader-spin text-amber-500 w-12 h-12" />
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col selection:bg-amber-500 selection:text-black">
                    
                    {/* Unauthorized Modal */}
                    {showModal === 'unauthorized' && (
                        <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-6">
                            <div className="magic-modal w-full max-w-sm rounded-[3.5rem] p-10 flex flex-col items-center text-center animate-in zoom-in duration-300">
                                <div className="w-24 h-24 bg-gray-800 rounded-full mb-8 border-2 border-amber-500/20 shadow-xl overflow-hidden flex items-center justify-center">
                                    <Icons.Book className="w-10 h-10 text-amber-500/50" />
                                </div>
                                <h2 className="text-3xl font-black text-white mb-6 tracking-widest">開啟魔法大門</h2>
                                <div className="text-gray-400 text-sm font-medium leading-relaxed mb-10 space-y-2">
                                    <p>購買科目後即可 <span className="text-amber-400 font-bold">多次觀看</span> 特訓內容。</p>
                                    <p>認真完成修煉，更可獲得</p>
                                    <p className="text-white font-black border-b-2 border-amber-500 inline-block px-1">高額寶石卡獎勵！</p>
                                </div>
                                <a 
                                    href="https://line.me/ti/p/vQcf6cONnl" 
                                    target="_blank"
                                    className="w-full py-5 bg-[#00B900] text-white rounded-2xl font-black text-sm tracking-[0.2em] shadow-[0_10px_25px_rgba(0,185,0,0.3)] hover:scale-105 transition-transform flex items-center justify-center gap-2 mb-8"
                                >
                                    透過 LINE 洽詢開通
                                </a>
                                <button onClick={() => setShowModal(null)} className="text-xs font-bold text-gray-500 tracking-widest hover:text-white">暫時離開</button>
                            </div>
                        </div>
                    )}

                    {/* Login Modal */}
                    {showModal === 'login' && (
                        <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-6">
                            <div className="magic-modal w-full max-w-sm rounded-[3rem] p-10 flex flex-col items-center text-center animate-in zoom-in duration-300">
                                <div className="bg-amber-500 p-3 rounded-2xl mb-6 text-black"><Icons.Sparkles className="w-8 h-8" /></div>
                                <h2 className="text-2xl font-black text-white mb-2 tracking-widest">魔法學院登入</h2>
                                <p className="text-xs text-gray-500 mb-8 font-medium">請選擇您的修煉身份驗證方式</p>
                                
                                <button 
                                    onClick={handleGoogleLogin}
                                    className="w-full py-4 bg-white text-black rounded-2xl font-black text-xs tracking-widest uppercase shadow-xl flex items-center justify-center gap-3 hover:bg-gray-100 transition-all mb-4"
                                >
                                    <Icons.Google className="w-5 h-5" /> 使用 Google 帳號登入
                                </button>
                                
                                <div className="w-full flex items-center gap-4 my-6">
                                    <div className="h-px bg-white/10 flex-grow"></div>
                                    <span className="text-[10px] text-gray-600 font-bold uppercase tracking-widest">或是使用手機號碼</span>
                                    <div className="h-px bg-white/10 flex-grow"></div>
                                </div>

                                <div className="w-full space-y-3 mb-8">
                                    <input 
                                        type="tel" 
                                        placeholder="手機號碼 (09...)" 
                                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-amber-500 focus:outline-none transition-colors font-medium"
                                        value={phoneNumber}
                                        onChange={(e) => setPhoneNumber(e.target.value)}
                                    />
                                    <button className="w-full py-3 bg-amber-500/10 border border-amber-500/30 text-amber-400 rounded-xl font-black text-[10px] tracking-widest uppercase hover:bg-amber-500/20">傳送魔法驗證碼</button>
                                </div>

                                <button onClick={() => setShowModal(null)} className="text-xs font-bold text-gray-600 hover:text-white">取消登入</button>
                            </div>
                        </div>
                    )}

                    {/* Floating LINE Button */}
                    <div className="fixed bottom-8 right-8 z-50 group">
                        <div className="absolute -top-16 right-0 line-bubble px-4 py-3 rounded-2xl text-[11px] font-black text-[#00E000] opacity-0 group-hover:opacity-100 transition-all transform translate-y-2 group-hover:translate-y-0 whitespace-nowrap shadow-2xl">
                            魔導師在線解答 
                        </div>
                        <a 
                            href="https://line.me/ti/p/vQcf6cONnl" 
                            target="_blank"
                            className="floating-line flex items-center justify-center w-16 h-16 text-white rounded-2xl shadow-[0_15px_40px_rgba(0,185,0,0.4)] hover:rotate-12 transition-all cursor-pointer"
                        >
                            <Icons.Line className="w-9 h-9" />
                        </a>
                    </div>

                    {/* Navbar */}
                    <nav className="h-20 bg-[#060813]/80 backdrop-blur-xl sticky top-0 z-40 border-b border-amber-900/20">
                        <div className="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-amber-500 p-1.5 rounded-lg text-black shadow-[0_0_15px_rgba(245,158,11,0.5)]">
                                    <Icons.Sparkles className="w-6 h-6" />
                                </div>
                                <span className="text-xl font-black tracking-tighter text-amber-400 uppercase">Jingming Magic Academy</span>
                            </div>
                            {user ? (
                                <div className="flex items-center gap-4">
                                    <div className="text-[10px] text-gray-500 bg-white/5 px-4 py-2 rounded-full border border-white/10 font-mono">
                                        修煉者: {user.displayName || user.phoneNumber || user.email?.split('@')[0]}
                                    </div>
                                    <button onClick={() => window.magicAcademy.actions.signOut(window.magicAcademy.auth)} className="text-[10px] font-bold text-gray-600 hover:text-red-400 transition-colors uppercase tracking-widest">
                                        登出
                                    </button>
                                </div>
                            ) : (
                                <button onClick={() => setShowModal('login')} className="px-6 py-2 bg-amber-500 text-black rounded-full font-black text-sm hover:bg-amber-400 transition-all shadow-[0_0_20px_rgba(245,158,11,0.3)]">
                                    學院登入
                                </button>
                            )}
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header className="relative pt-24 pb-16 px-6 text-center overflow-hidden">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[800px] bg-amber-500/5 blur-[120px] -z-10 rounded-full"></div>
                        <div className="max-w-5xl mx-auto">
                            <div className="inline-block bg-amber-500/10 border border-amber-500/20 px-4 py-1.5 rounded-full mb-8">
                                <span className="text-[10px] font-black tracking-[0.3em] text-amber-400 uppercase">認真修煉 • 領取高額寶石獎勵</span>
                            </div>
                            <h1 className="text-6xl md:text-8xl font-black text-white mb-8 tracking-tighter leading-tight">
                                金名魔法學院<br/>
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-amber-400 to-amber-200 italic">私中特訓門戶</span>
                            </h1>
                            <p className="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto font-medium leading-relaxed mb-12">
                                專為私中入學打造的修煉系統。透過魔導教材與邏輯魔法，<br className="hidden md:block" />
                                讓每位學員都能在競爭中脫穎而出。
                            </p>
                        </div>
                    </header>

                    {/* Subject Section (Color Differentiated) */}
                    <section className="py-16 max-w-7xl mx-auto px-6">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                            {subjects.map(s => (
                                <div key={s.id} className="magic-card rounded-[3.5rem] p-10 flex flex-col items-center text-center relative group">
                                    <div className="seal-circle w-20 h-20 rounded-full mb-10 flex items-center justify-center">
                                        <div className={`w-14 h-14 rounded-full flex items-center justify-center bg-gradient-to-br ${s.color}`}>
                                            <span className="text-amber-400 font-black text-2xl tracking-tighter">{s.char}</span>
                                        </div>
                                    </div>

                                    <h3 className="text-2xl font-black text-white mb-4 tracking-wider">{s.title}</h3>
                                    <p className="text-[13px] text-gray-400 font-medium leading-relaxed mb-12 min-h-[60px] max-w-[240px]">
                                        {s.desc}
                                    </p>

                                    <button 
                                        onClick={() => handleUnlock(s.id)}
                                        className={`w-full py-4 bg-white/5 border border-white/10 text-white ${s.btnHover} hover:text-black hover:border-transparent transition-all rounded-full font-black text-sm tracking-[0.2em] uppercase mb-6 group-hover:scale-[1.03] shadow-lg`}
                                    >
                                        立即解鎖魔法
                                    </button>

                                    <div className="flex items-center gap-2 text-[10px] font-bold text-amber-500/40 tracking-[0.2em] uppercase">
                                        <span>多次觀看</span>
                                        <span className="w-1 h-1 bg-amber-500/20 rounded-full"></span>
                                        <span>贏取獎勵</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Promotion CTA */}
                    <section className="pb-24 text-center">
                        <a 
                            href="https://mocher235-byte.github.io/jingming/" 
                            target="_blank"
                            className="inline-flex items-center gap-4 bg-gradient-to-r from-red-600 to-orange-600 px-8 py-5 rounded-[2.5rem] text-white font-black hover:scale-105 active:scale-95 transition-all shadow-[0_20px_50px_rgba(220,38,38,0.3)]"
                        >
                            <div className="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center text-2xl">🎯</div>
                            <div className="text-left">
                                <div className="text-[10px] opacity-80 font-black tracking-widest uppercase">Jingming Lead • Victory Focus</div>
                                <div className="text-lg md:text-xl">115年私中特訓班｜立即預約門票</div>
                            </div>
                            <Icons.ExternalLink className="w-6 h-6 opacity-60 ml-2" />
                        </a>
                    </section>

                    {/* Privileges */}
                    <section className="py-24 bg-[#080a18] border-y border-white/5">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            <div className="inline-block border border-amber-500/30 px-3 py-1 rounded mb-4">
                                <span className="text-[10px] font-bold tracking-[0.3em] text-amber-500 uppercase">Academy Privileges</span>
                            </div>
                            <h2 className="text-4xl font-black text-white tracking-widest mb-16">學院特權</h2>
                            
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                                {privileges.map((p, i) => (
                                    <div key={i} className="magic-card rounded-[3rem] p-10 flex flex-col items-center text-center">
                                        <div className="w-16 h-16 bg-white/5 rounded-2xl flex items-center justify-center text-amber-400 mb-6 border border-white/5">
                                            <p.icon className="w-8 h-8" />
                                        </div>
                                        <h3 className="text-lg font-black text-white mb-2">{p.title}</h3>
                                        <p className="text-xs text-gray-500 font-medium leading-relaxed">{p.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Branches Section */}
                    <section className="py-24 bg-black/40">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-12">
                                {branches.map((b, i) => (
                                    <div key={i} className="space-y-6 group">
                                        <div className="flex items-baseline gap-2">
                                            <h4 className="text-2xl font-black text-white">{b.name}</h4>
                                            <span className="text-[10px] text-amber-500 font-bold uppercase tracking-widest flex items-center gap-1">
                                                <Icons.History className="w-3 h-3" /> {b.year}
                                            </span>
                                        </div>
                                        <div className="space-y-4">
                                            <div className="flex gap-4 items-start">
                                                <Icons.Phone className="w-5 h-5 text-amber-400 mt-1" />
                                                <a href={`tel:${b.tel}`} className="text-lg font-mono text-gray-300 hover:text-white transition-colors">{b.tel}</a>
                                            </div>
                                            <div className="flex gap-4 items-start">
                                                <Icons.MapPin className="w-5 h-5 text-amber-400 mt-1" />
                                                <span className="text-sm text-gray-400 leading-relaxed font-medium">{b.addr}</span>
                                            </div>
                                        </div>
                                        <a 
                                            href={b.map} 
                                            target="_blank"
                                            className="inline-flex items-center gap-2 text-[10px] font-black text-amber-500 tracking-widest uppercase hover:translate-x-2 transition-transform"
                                        >
                                            開啟魔法傳送地圖 <Icons.ExternalLink className="w-3 h-3" />
                                        </a>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-12 border-t border-white/5 text-center">
                        <div className="text-[10px] font-bold text-gray-600 tracking-[0.5em] uppercase mb-4">
                            © 金名魔法學院 • JINGMING ACADEMY • SINCE 2011
                        </div>
                        <div className="text-[9px] text-gray-700 font-medium">
                            專業私中入學特訓｜國語邏輯｜數學思維｜英文語法
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
