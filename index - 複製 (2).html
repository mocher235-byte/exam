<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金名魔法學院 - 私中特訓門戶</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide React Icons -->
    <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0a0c1b; color: #e2e8f0; margin: 0; padding: 0; }
        .magic-glow { box-shadow: 0 0 20px rgba(251, 191, 36, 0.2); }
        .magic-card-hover { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .magic-card-hover:hover { transform: translateY(-12px); box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7); border-color: rgba(251, 191, 36, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const LucideIcons = window.LucideReact || {};
        const { 
            Book, Sparkles, Lock, Unlock, LogOut, MessageSquare, 
            CreditCard, ChevronRight, Loader2, Diamond, Zap, 
            Scroll, Wand2, User, Trophy, School 
        } = LucideIcons;

        const SafeIcon = ({ icon: Icon, ...props }) => Icon ? <Icon {...props} /> : null;

        // Firebase 模擬設定 (發布到 GitHub 時，請確保這些權限資料存在於 Firestore)
        const appId = 'jingming-magic-academy';

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(false);
            const [permissions, setPermissions] = useState({
                chinese: false,
                math: false,
                english: false
            });
            const [showModal, setShowModal] = useState(null);

            // 模擬登入與讀取權限 (實際環境中請串接 Firebase Auth & Firestore onSnapshot)
            const handleLogin = () => {
                setLoading(true);
                setTimeout(() => {
                    setUser({ email: 'magic_student@jingming.edu', uid: 'test_uid' });
                    // 這裡模擬從資料庫讀取到的權限
                    setPermissions({ chinese: true, math: false, english: false });
                    setLoading(false);
                }, 800);
            };

            const subjects = [
                {
                    id: 'chinese',
                    title: '國語魔法卷軸',
                    desc: '解鎖高階成語、國學常識與應用文。精修詞章秘法，掌握文字精髓。',
                    color: 'from-emerald-700 to-teal-900',
                    borderColor: 'border-emerald-400/20',
                    url: './Chinese-Exam/index.html', // 指向您的資料夾
                    hasAccess: permissions.chinese,
                    IconComp: Scroll
                },
                {
                    id: 'math',
                    title: '數學邏輯水晶',
                    desc: '邏輯推理與幾何空間之奧秘。精準解析私中熱門題型，計算如魔法般精確。',
                    color: 'from-amber-600 to-orange-900',
                    borderColor: 'border-amber-400/20',
                    url: './Math-Exam/index.html',
                    hasAccess: permissions.math,
                    IconComp: Zap
                },
                {
                    id: 'english',
                    title: '英語語法魔杖',
                    desc: '從代名詞到進階語法。掌握英語魔咒，讓外語溝通揮灑自如。',
                    color: 'from-indigo-700 to-purple-950',
                    borderColor: 'border-indigo-400/20',
                    url: './English-Exam/index.html',
                    hasAccess: permissions.english,
                    IconComp: Wand2
                }
            ];

            return (
                <div className="min-h-screen flex flex-col">
                    <div className="h-1.5 w-full bg-gradient-to-r from-transparent via-amber-400 to-transparent shadow-lg shadow-amber-500/20"></div>

                    <nav className="bg-[#0f1225]/95 backdrop-blur-md sticky top-0 z-40 border-b border-amber-900/30">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-gradient-to-br from-amber-400 to-amber-600 p-2 rounded-xl text-[#0a0c1b] magic-glow">
                                    <SafeIcon icon={Sparkles} size={24} strokeWidth={2.5} />
                                </div>
                                <span className="text-xl font-black tracking-[0.15em] text-amber-400">金名魔法學院</span>
                            </div>
                            <div className="flex items-center gap-4">
                                {user ? (
                                    <button onClick={() => setUser(null)} className="p-2 text-gray-400 hover:text-red-400 transition-colors bg-white/5 rounded-full">
                                        <SafeIcon icon={LogOut} size={20} />
                                    </button>
                                ) : (
                                    <button onClick={handleLogin} className="border-2 border-amber-500/50 text-amber-400 px-8 py-2 rounded-full font-black hover:bg-amber-500/10 transition-all text-sm tracking-widest">
                                        學院登入
                                    </button>
                                )}
                            </div>
                        </div>
                    </nav>

                    <header className="relative py-24 px-6 text-center">
                        <div className="max-w-4xl mx-auto relative z-10">
                            <div className="inline-flex items-center gap-3 bg-amber-500/10 border border-amber-500/20 px-6 py-2.5 rounded-full mb-12 animate-pulse text-center">
                                <SafeIcon icon={Diamond} size={16} className="text-amber-400" />
                                <span className="text-xs font-black tracking-[0.2em] text-amber-200 uppercase">認真讀書 • 領取高額寶石卡獎勵</span>
                            </div>
                            <h1 className="text-5xl md:text-7xl font-black mb-8 leading-tight text-white tracking-tight text-center">
                                挑戰私中入學<br/>
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-amber-400 to-amber-200 italic">魔法特訓門戶</span>
                            </h1>
                            <p className="text-base md:text-xl text-gray-400 max-w-2xl mx-auto leading-relaxed font-medium text-center">
                                金名文理補習班專用魔法教材。認真讀書，成就魔法未來。
                            </p>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 pb-32">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                            {subjects.map(subject => (
                                <div key={subject.id} className={`magic-card-hover group relative bg-[#131730] rounded-[3rem] p-1 border ${subject.borderColor} flex flex-col`}>
                                    <div className={`rounded-[2.8rem] bg-gradient-to-b ${subject.color} p-10 flex flex-col h-full items-center text-center`}>
                                        <div className="relative mb-10">
                                            <div className="bg-black/40 p-6 rounded-[2rem] backdrop-blur-xl border border-white/10 group-hover:scale-110 transition-transform duration-500">
                                                <SafeIcon icon={subject.IconComp} size={48} strokeWidth={1.5} className="text-white" />
                                            </div>
                                            <div className="absolute -top-3 -right-3">
                                                {subject.hasAccess ? (
                                                    <span className="bg-emerald-500 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg shadow-emerald-900/40">魔力已解鎖</span>
                                                ) : (
                                                    <span className="bg-black/60 text-amber-500/90 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-amber-500/30">魔法封印中</span>
                                                )}
                                            </div>
                                        </div>
                                        <h3 className="text-2xl font-black text-white mb-5 tracking-tight text-center">{subject.title}</h3>
                                        <p className="text-white/70 text-sm leading-relaxed mb-12 flex-grow font-medium text-center">{subject.desc}</p>
                                        
                                        {subject.hasAccess ? (
                                            <a href={subject.url} className="w-full py-4.5 rounded-2xl bg-white text-[#0a0c1b] font-black text-sm tracking-[0.25em] uppercase flex items-center justify-center gap-2 hover:bg-amber-400 transition-all shadow-2xl active:scale-95">
                                                進入修煉 <SafeIcon icon={ChevronRight} size={20} />
                                            </a>
                                        ) : (
                                            <button onClick={() => setShowModal('buy')} className="w-full py-4.5 rounded-2xl bg-black/40 text-white/60 font-black text-sm tracking-[0.2em] border border-white/10 hover:bg-black/60 transition-all flex items-center justify-center gap-2">
                                                立即解鎖魔法 <SafeIcon icon={Lock} size={18} />
                                            </button>
                                        )}
                                        <div className="mt-8 pt-5 border-t border-white/10 w-full flex items-center justify-center gap-2 text-[10px] font-black text-amber-300/80 tracking-[0.2em] uppercase text-center">
                                            <SafeIcon icon={Diamond} size={14} /> 購買科目 • 多次觀看 • 贏取獎勵
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {showModal === 'buy' && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/85 backdrop-blur-md">
                            <div className="bg-[#1a1f3c] border border-amber-500/40 rounded-[3.5rem] max-w-md w-full p-12 text-center shadow-2xl">
                                <div className="bg-amber-500/20 w-28 h-28 rounded-full flex items-center justify-center text-amber-400 mx-auto mb-10"><SafeIcon icon={Wand2} size={56} strokeWidth={1} /></div>
                                <h3 className="text-3xl font-black text-amber-100 mb-6 tracking-tight text-center">開啟魔法大門</h3>
                                <p className="text-gray-400 mb-12 leading-relaxed font-medium text-center">購買科目後即可<span className="text-amber-400 font-black"> 多次觀看 </span>特訓內容，更可獲得<span className="text-white font-black underline decoration-amber-500 underline-offset-8">高額寶石卡獎勵！</span></p>
                                <button onClick={() => window.open('https://line.me', '_blank')} className="w-full bg-[#00B900] text-white py-5 rounded-[1.25rem] font-black text-sm tracking-[0.3em] uppercase hover:brightness-110 shadow-xl active:scale-95 transition-all mb-4">透過 LINE 洽詢開通</button>
                                <button onClick={() => setShowModal(null)} className="text-gray-500 font-bold hover:text-gray-300 text-center">暫時離開</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
